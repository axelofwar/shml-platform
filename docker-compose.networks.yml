# Network Segmentation Plan for SHML Platform
# =============================================
# This file defines the target network architecture for production deployment.
#
# CURRENT STATE: All services share one flat network (shml-platform, 172.30.0.0/16)
# TARGET STATE: 4 isolated networks with controlled cross-network visibility
#
# Networks:
#   auth-net:       FusionAuth, OAuth2-Proxy, role-auth, Redis (sessions)
#   data-net:       PostgreSQL, Nessie, Redis (data cache)
#   inference-net:  All inference services, Docker Socket Proxy
#   platform-net:   Traefik, Homer, Grafana, Prometheus, Dozzle, Code Server, FiftyOne
#
# Cross-Network Rules:
#   - Traefik joins ALL networks (ingress point)
#   - OAuth2-Proxy joins auth-net + platform-net (forward auth)
#   - Inference services join inference-net + data-net (DB access)
#   - Inference services DO NOT join auth-net (cannot reach FusionAuth API)
#   - Monitoring (Grafana, Prometheus) joins platform-net + data-net (scrape metrics)
#
# MIGRATION:
#   1. Create this file with network definitions
#   2. Add network assignments to each service in their compose file
#   3. Test service-to-service connectivity
#   4. Remove the flat 'platform' network
#
# This is a PLANNING FILE. Implementation requires updating each service's
# docker-compose.yml to specify which networks they join.

networks:
  auth-net:
    name: ${PLATFORM_PREFIX:-shml}-auth
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

  data-net:
    name: ${PLATFORM_PREFIX:-shml}-data
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.1.0/24

  inference-net:
    name: ${PLATFORM_PREFIX:-shml}-inference
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.2.0/24

  platform-net:
    name: ${PLATFORM_PREFIX:-shml}-platform-v2
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.3.0/24

