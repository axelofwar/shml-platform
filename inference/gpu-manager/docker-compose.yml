# Unified GPU Manager
# ====================
# Coordinates GPU yield across all inference services for training.
#
# Start: docker compose -f docker-compose.gpu-manager.yml up -d
# Status: curl http://localhost:8012/status
#
# Endpoints:
# - POST /training/start - Yield RTX 3090 for training, activate fallback on RTX 2070
# - POST /training/end - Restore RTX 3090, deactivate fallback
# - GET /health - Quick health check
# - GET /status - Detailed status of all GPUs and services
#
# Managed services:
# - qwopus-coding (RTX 3090 Ti, ~21GB) - Primary coding model
# - watchdog-llm (RTX 2070, ~3GB) - Always-on watchdog triage
# - embedding-service (RTX 2070, 1.5GB) - Embeddings

services:
  gpu-control-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: gpu-control-proxy
    restart: unless-stopped
    privileged: true

    environment:
      CONTAINERS: 1
      INFO: 1
      VERSION: 1
      POST: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      LOG_LEVEL: warning

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - shml-platform

    expose:
      - "2375"

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:2375/version" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gpu-manager:
    image: ${SHML_REGISTRY_IMAGE_PREFIX:-shml/local}/gpu-manager:${SHML_IMAGE_TAG:-latest}
    pull_policy: ${SHML_IMAGE_PULL_POLICY:-missing}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpu-manager
    restart: unless-stopped

    environment:
      - YIELD_WAIT_SECONDS=5
      - PLATFORM_PREFIX=${PLATFORM_PREFIX:-shml}
      # SECURITY: Docker access via a dedicated proxy limited to container lifecycle ops.
      - DOCKER_HOST=tcp://gpu-control-proxy:2375

    # SECURITY: Docker socket removed - was critical host-escape vector
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock

    # Run with docker group for socket access
    # Get docker GID with: getent group docker | cut -d: -f3
    user: "1000:984" # UID:docker-GID (adjust GID if different)

    # SECURITY: No direct port exposure - access through Traefik only
    # ports:
    #   - "8012:8000"  # REMOVED: was bypassing auth

    networks:
      - shml-platform

    depends_on:
      gpu-control-proxy:
        condition: service_healthy

    labels:
      - "logging=promtail"
      - "traefik.enable=true"
      # GPU Manager API - for Ray jobs and other services
      - "traefik.http.routers.gpu-manager.rule=PathPrefix(`/api/gpu-manager`)"
      - "traefik.http.routers.gpu-manager.priority=2147483645"
      - "traefik.http.services.gpu-manager.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.gpu-manager-strip.stripprefix.prefixes=/api/gpu-manager"
      # SECURITY: Require OAuth + developer role (was completely unprotected)
      - "traefik.http.routers.gpu-manager.middlewares=oauth2-errors,oauth2-auth,role-auth-developer,gpu-manager-strip"

    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  shml-platform:
    external: true
