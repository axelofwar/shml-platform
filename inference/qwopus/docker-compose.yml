services:
  qwopus-coding:
    image: ${SHML_REGISTRY_IMAGE_PREFIX:-shml/local}/qwopus-coding:${SHML_IMAGE_TAG:-latest}
    pull_policy: ${SHML_IMAGE_PULL_POLICY:-missing}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwopus-coding
    restart: unless-stopped

    environment:
      - NVIDIA_VISIBLE_DEVICES=0 # RTX 3090 Ti only
      - CUDA_VISIBLE_DEVICES=0

    volumes:
      - ../../data/models/qwopus:/models:ro

    command:
      - --model
      - /models/${CODING_MODEL_GGUF:-Qwen3.5-27B.Q4_K_M.gguf}
      - --alias
      - ${CODING_MODEL_ALIAS:-qwopus-coding}
      - --threads
      - "-1"
      - --n-gpu-layers
      - "999"
      - --ctx-size
      - "${CODING_MODEL_CTX:-131072}"
      # KV cache quantization
      # Architecture: Qwen3.5-27B — pure transformer, all ~36 attention layers have KV.
      #   GQA: n_kv_heads ≈ 8, head_dim=128. Very different from Nemotron (only 6 attn layers).
      #
      # VRAM budget at ctx=131072 (128K), 16.5 GB Q4_K_M weights → 7.5 GB headroom on RTX 3090 Ti:
      #   KV f16 (default): ~18.0 GB → total ~34.5 GB → over 24 GB limit ❌
      #   KV q8_0:           ~9.0 GB → total ~25.5 GB → over 24 GB limit ❌
      #   KV q4_0 (applied): ~4.5 GB → total ~21.0 GB → 3.0 GB remaining ✅
      # q4_0 is required at 128K context. Quality impact is negligible per TurboQuant paper.
      # At 65K context, q8_0 was the sweet spot. At 128K, q4_0 is the only option that fits.
      - --cache-type-k
      - q4_0
      - --cache-type-v
      - q4_0
      # To reduce further (still safe): change both to q4_0 (saves 288 MiB vs f16)
      - --port
      - "8000"
      - --host
      - 0.0.0.0
      - --jinja
      # reasoning-format auto: lets model use extended thinking when needed for tool calls.
      # Validated by JoelDeTeves (2026-03-28): zero tool-call failures at 100+ T/s on RTX A5000.
      # Replaces --reasoning-budget 0 (which was silently disabling all chain-of-thought).
      - --reasoning-format
      - auto
      # Flash attention: requires explicit on/off/auto value in newer llama.cpp builds.
      - --flash-attn
      - "on"
      - --batch-size
      - "4096"
      - --ubatch-size
      - "2048"
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0.0"
      # presence-penalty 0.5: key setting — prevents repetitive tool-call loops.
      - --presence-penalty
      - "0.5"

    # SECURITY: No direct port exposure - access through Traefik only
    # ports:
    #   - "8010:8000"  # REMOVED: was bypassing auth

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]

    labels:
      - "logging=promtail"
      - "traefik.enable=true"
      - "traefik.http.routers.coding-model.rule=PathPrefix(`/api/coding`)"
      - "traefik.http.routers.coding-model.priority=2147483647"
      - "traefik.http.services.coding-model.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.coding-model-strip.stripprefix.prefixes=/api/coding"
      - "traefik.http.routers.coding-model.middlewares=oauth2-errors,oauth2-auth,coding-model-strip"

    networks:
      - shml-platform

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # Coding Manager - GPU Yield API for Training Integration
  # Provides /training/start and /training/end endpoints for Ray jobs
  # ==========================================================================
  coding-manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: coding-manager
    restart: unless-stopped

    environment:
      - CODING_CONTAINER=qwopus-coding
      - GPU_INDEX=0
      - YIELD_WAIT_SECONDS=5

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Run with docker group for socket access
    user: "1000:984" # UID:docker-GID (adjust GID if different)

    # SECURITY: No direct port exposure - access through Traefik only
    # ports:
    #   - "8011:8000"  # REMOVED: was bypassing auth

    networks:
      - shml-platform

    labels:
      - "traefik.enable=true"
      # Training yield API - accessible to Ray jobs
      - "traefik.http.routers.coding-manager.rule=PathPrefix(`/api/coding-manager`)"
      - "traefik.http.routers.coding-manager.priority=2147483646"
      - "traefik.http.services.coding-manager.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.coding-manager-strip.stripprefix.prefixes=/api/coding-manager"
      - "traefik.http.routers.coding-manager.middlewares=oauth2-errors,oauth2-auth,coding-manager-strip"

    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    depends_on:
      - qwopus-coding

networks:
  shml-platform:
    external: true
