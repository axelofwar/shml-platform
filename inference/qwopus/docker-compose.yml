services:
  qwopus-coding:
    # ==========================================================================
    # Qwopus-Coding — Primary Coding LLM (RTX 3090 Ti, GPU 0)
    # Model: Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-AWQ-4bit
    # Backend: vLLM v0.19.0 (native Qwen3_5ForConditionalGeneration support)
    # Mode: enforce-eager (no CUDA graphs — required to fit within 24GB VRAM)
    # VRAM: ~17.78 GB weights + ~4.6 GB KV cache (32K ctx) = ~22.4 GB peak (within 24 GB)
    # Vision encoder disabled (image=0,video=0): text-only coding workload
    # Throughput: ~14-21 tok/s (enforce-eager penalty; ~2x faster if CUDA graphs)
    # Benchmarked: 2026-04-09 vs GGUF Q4_K_M (GGUF 1.6-2.3x faster but same quality)
    # Why AWQ: Opus reasoning distill — better multi-step code reasoning chains
    # ==========================================================================
    image: vllm/vllm-openai:v0.19.0
    container_name: qwopus-coding
    restart: unless-stopped
    shm_size: '4gb'

    environment:
      - NVIDIA_VISIBLE_DEVICES=0 # RTX 3090 Ti only
      - CUDA_VISIBLE_DEVICES=0

    volumes:
      - /home/axelofwar/Projects/shml-platform-storage/data/models/qwopus-awq:/models/qwopus-awq:ro

    command:
      - --model
      - /models/qwopus-awq
      - --served-model-name
      - qwopus-coding
      # Max context: 32768 tokens — Hermes system prompt (~5K) + long agent
      # chains (10K+ tool output) + 2048 output tokens fits without truncation.
      # KV cache at 32K: 2048 blocks × 2.25 MB = 4.6 GB — requires util=0.93.
      # Hardware ceiling on RTX 3090 Ti (24 GB): ~33K (64K/128K impossible).
      - --max-model-len
      - "32768"
      - --trust-remote-code
      - --dtype
      - auto
      # GPU memory fraction: 0.93 — needed for 32K KV cache (4.6 GB from ~5.5 GB budget).
      # Leaves ~0.9 GB headroom for CUDA/driver overhead. Safe on 24 GB VRAM.
      - --gpu-memory-utilization
      - "0.93"
      # CPU KV offloading: 16 GB of host RAM as overflow for KV blocks.
      # In vLLM v0.19.0 --swap-space was replaced by --kv-offloading-size.
      # Effect per-request: max_model_len (32K) is still the hard ceiling.
      # Effect on concurrency: when GPU KV cache fills across multiple parallel
      # requests, cold blocks spill to CPU RAM instead of evicting (blocking).
      # Helps agent workloads with multiple concurrent tool-call chains.
      # Default backend is 'native' (CPU RAM) — no extra flag needed.
      - --kv-offloading-size
      - "16G"
      # enforce-eager: disables CUDA graph capture (which needs ~1.5 GB extra and hit OOM).
      # Throughput cost: ~1.5-2x slower than graph mode, but required on 24 GB VRAM.
      - --enforce-eager
      # Disable vision encoder profiling — saves ~4.5 GB VRAM, text-only inference.
      # Re-enable by removing these two args if multimodal input is needed.
      - --limit-mm-per-prompt
      - '{"image":0,"video":0}'
      # Max concurrent sequences: 4 is sufficient for serial agent workloads.
      - --max-num-seqs
      - "4"
      # Tool calling: enable auto tool choice + Qwen3 Coder XML parser.
      # Required for Hermes agent and any OpenAI-tools client (sends tools=[...]).
      # Qwen3.5 outputs XML-format tool calls: <function=name><parameter=key>value</parameter></function>
      # The qwen3_coder parser (vLLM v0.19.0) matches this exact format.
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --port
      - "8000"
      - --host
      - "0.0.0.0"

    # SECURITY: No direct port exposure - access through Traefik only
    # ports:
    #   - "8010:8000"  # REMOVED: bypasses auth

    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 32G
        reservations:
          cpus: "2.0"
          memory: 8G
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]

    labels:
      - "logging=promtail"
      - "traefik.enable=true"
      - "traefik.http.routers.coding-model.rule=PathPrefix(`/api/coding`)"
      - "traefik.http.routers.coding-model.priority=2147483647"
      - "traefik.http.services.coding-model.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.coding-model-strip.stripprefix.prefixes=/api/coding"
      - "traefik.http.routers.coding-model.middlewares=oauth2-errors,oauth2-auth,coding-model-strip"

    networks:
      - shml-platform

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s # vLLM AWQ takes ~3min to load model + run profiling

  # ==========================================================================
  # Coding Manager - GPU Yield API for Training Integration
  # Provides /training/start and /training/end endpoints for Ray jobs
  # ==========================================================================
  coding-manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: coding-manager
    restart: unless-stopped

    environment:
      - CODING_CONTAINER=qwopus-coding
      - GPU_INDEX=0
      - YIELD_WAIT_SECONDS=5

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Run with docker group for socket access
    user: "1000:984" # UID:docker-GID (adjust GID if different)

    # SECURITY: No direct port exposure - access through Traefik only
    # ports:
    #   - "8011:8000"  # REMOVED: was bypassing auth

    networks:
      - shml-platform

    labels:
      - "traefik.enable=true"
      # Training yield API - accessible to Ray jobs
      - "traefik.http.routers.coding-manager.rule=PathPrefix(`/api/coding-manager`)"
      - "traefik.http.routers.coding-manager.priority=2147483646"
      - "traefik.http.services.coding-manager.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.coding-manager-strip.stripprefix.prefixes=/api/coding-manager"
      - "traefik.http.routers.coding-manager.middlewares=oauth2-errors,oauth2-auth,coding-manager-strip"

    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    depends_on:
      - qwopus-coding

networks:
  shml-platform:
    external: true
