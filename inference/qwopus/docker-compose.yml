services:
  qwopus-coding:
    # ==========================================================================
    # Qwopus-Coding — Primary Coding LLM (RTX 3090 Ti, GPU 0)
    # Model: Qwen3.5-27B.Q4_K_M.gguf
    # Backend: llama.cpp server-cuda (promoted from vLLM, 2026-04-20)
    # Context: 81920 tokens (q4_0 quantised KV cache)
    #   q4_0 KV at 80K: ~2.6 GB vs fp16 ~10.5 GB — 4x VRAM savings
    # VRAM: Q4_K_M ~15.4 GB weights + q4_0 KV at 80K ~2.6 GB = ~18.0 GB
    # Throughput: 37-38 tok/s (1.8-2.5x faster than vLLM enforce-eager)
    # Tool calling: Jinja template from embedded GGUF (Qwen3 im_start format)
    # GPU: RTX 3090 Ti (cuda:0, SM86, 24 GB VRAM)
    #
    # Promotion criteria met (2026-04-20 Phase B2):
    #   1. Planning score: 88+/100 (same as B1 baseline)
    #   2. Tool-call correct selection: 7/7
    #   3. Security detection: >=5/6
    #   4. Long-context recall at 80K+
    #   5. Throughput: 37-38 tok/s (floor: 10-20)
    #   6. Context window: 81920 tokens (floor: 70-90K)
    #
    # Previous backend: vLLM v0.19.0 (AWQ 4-bit, 44688 ctx)
    # Backup of vLLM config: docker-compose.vllm-backup.yml
    # Benchmarking config: docker-compose.turboquant.yml
    #
    # NOTE: turbo4 KV cache available via TheTom/llama-cpp-turboquant image
    #   when available, swap image and use --cache-type-k turbo4 --cache-type-v turbo4
    # ==========================================================================
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: qwopus-coding
    restart: unless-stopped

    shm_size: '2gb'

    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0

    volumes:
      - /home/axelofwar/Projects/shml-platform-storage/data/models/qwopus:/models/qwopus:ro

    command:
      # Model
      - --model
      - /models/qwopus/Qwen3.5-27B.Q4_K_M.gguf
      # Full GPU offload — all 46 layers to VRAM (Q4_K_M weight tiles fit in 15.4 GB)
      - --n-gpu-layers
      - "999"
      # 80K context window — 1.83x more than previous vLLM 44688 ceiling
      # q4_0 KV at 81920: ~2.6 GB vs fp16 ~10.5 GB — 4x savings
      - --ctx-size
      - "81920"
      # q4_0: 4-bit quantised K and V cache (standard llama.cpp, all backends)
      # This is the key flag that enables 80K+ context on 24 GB
      # NOTE: swap to turbo4 when TheTom/llama-cpp-turboquant image is available
      - --cache-type-k
      - q4_0
      - --cache-type-v
      - q4_0
      # Thread count: 8 physical cores for pre-fill; GPU handles generation
      - --threads
      - "8"
      # Batch size for parallel pre-fill (prompt processing)
      # Higher = faster TTFT for long prompts; 512 is safe for 80K ctx
      - --batch-size
      - "512"
      # Ubatch: micro-batch for generation (token-by-token decode)
      - --ubatch-size
      - "128"
      # Max concurrent sequences. llama.cpp divides --ctx-size EQUALLY across
      # slots, so --parallel 4 at 81920 = 20480 per request — which clips
      # agent loops (hermes + MCP tool chains) that easily reach 30-40K tokens.
      # Set to 1 so a single request gets the full 81920-token context. The
      # only clients today are hermes (one human) and the chat-ui; concurrent
      # batch workloads route through coding-manager's yield API, not raw
      # /v1/chat/completions. Bump to 2 if a real multi-user scenario shows up.
      - --parallel
      - "1"
      # Flash attention — reduces VRAM during pre-fill, mandatory for long ctx
      - --flash-attn
      - "on"
      # Keep model BOS/EOS in VRAM (prevents reload on new sessions)
      - --keep
      - "-1"
      # Chat template: use the GGUF's embedded Jinja template (Qwen3 im_start format)
      # The GGUF embeds the full tool-use + thinking template; --jinja enables it.
      # Do NOT use --chat-template with --jinja — they conflict (causes 3-token prompts).
      - --jinja
      # Port: 8000 — drop-in replacement for vLLM (same port, same container name)
      - --port
      - "8000"
      - --host
      - "0.0.0.0"

    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 32G
        reservations:
          cpus: "2.0"
          memory: 8G
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]

    # SECURITY: No direct port exposure - access through Traefik only
    # ports:
    #   - "8010:8000"  # REMOVED: bypasses auth

    networks:
      - shml-platform

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s # GGUF loads faster than AWQ profiling — expect ~90s

    labels:
      - "logging=promtail"
      - "traefik.enable=true"
      - "traefik.http.routers.coding-model.rule=PathPrefix(`/api/coding`)"
      - "traefik.http.routers.coding-model.priority=2147483647"
      - "traefik.http.services.coding-model.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.coding-model-strip.stripprefix.prefixes=/api/coding"
      - "traefik.http.routers.coding-model.middlewares=oauth2-errors,oauth2-auth,coding-model-strip"

  # ==========================================================================
  # Coding Manager - GPU Yield API for Training Integration
  # Provides /training/start and /training/end endpoints for Ray jobs
  # ==========================================================================
  coding-manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: coding-manager
    restart: unless-stopped

    environment:
      - CODING_CONTAINER=qwopus-coding
      - GPU_INDEX=0
      - YIELD_WAIT_SECONDS=5

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Run with docker group for socket access
    user: "1000:984" # UID:docker-GID (adjust GID if different)

    # SECURITY: No direct port exposure - access through Traefik only
    # ports:
    #   - "8011:8000"  # REMOVED: was bypassing auth

    networks:
      - shml-platform

    labels:
      - "traefik.enable=true"
      # Training yield API - accessible to Ray jobs
      - "traefik.http.routers.coding-manager.rule=PathPrefix(`/api/coding-manager`)"
      - "traefik.http.routers.coding-manager.priority=2147483646"
      - "traefik.http.services.coding-manager.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.coding-manager-strip.stripprefix.prefixes=/api/coding-manager"
      - "traefik.http.routers.coding-manager.middlewares=oauth2-errors,oauth2-auth,coding-manager-strip"

    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    depends_on:
      - qwopus-coding

networks:
  shml-platform:
    external: true
