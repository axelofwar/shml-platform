# Agentic Coding Model Service - Fallback Architecture
# =====================================================
# IMPORTANT: Use ./start_all_safe.sh to manage this service!
#
# Start:  ./start_all_safe.sh start inference
# Stop:   ./start_all_safe.sh stop inference
# Status: ./start_all_safe.sh status
#
# This file uses external networks/volumes created by deploy/compose/docker-compose.infra.yml.
# Running standalone will fail unless infrastructure is already running.
#
# PRIMARY: Nemotron-3-Nano-30B-A3B (RTX 3090 Ti) - ~95% of Claude Sonnet quality
# FALLBACK: Qwen2.5-Coder-3B (RTX 2070) - ~75% of Claude quality + agentic services
#
# Traefik load balances between them, with primary preferred when healthy.
# When training starts, primary container stops, fallback takes over.
#
# Idle Management:
# - Primary goes idle after 60 minutes of inactivity (configurable)
# - When idle, health check fails -> Traefik routes to fallback
# - On next request, primary wakes up (~2-3 min) while fallback handles request
# - Once awake, primary resumes handling requests
#
# Warmup Feature:
# - Sends periodic pings every 15 minutes to keep model warm
# - Skips warmup when Ray training or native training is active
# - Prevents unexpected wake-up delays during normal usage

services:
  # ===========================================================================
  # Primary Model: DEPRECATED - Replaced by Nemotron-3-Nano-30B-A3B
  # See: inference/qwopus/docker-compose.yml
  # Nemotron provides 95% Claude Sonnet quality vs 90% for Qwen2.5-Coder-32B
  # ===========================================================================
  # coding-model-primary:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   image: ${PLATFORM_PREFIX:-shml}-coding-model:latest
  #   container_name: coding-model-primary
  #   restart: unless-stopped
  #   env_file:
  #     - ../../.env
  #   environment:
  #     # Mode: primary-only (simpler architecture)
  #     - MODEL_MODE=primary
  #     # Qwen2.5-Coder-32B - closest to Claude Sonnet quality (~90%)
  #     # AWQ 4-bit quantization fits in 24GB VRAM
  #     - MODEL_ID=Qwen/Qwen2.5-Coder-32B-Instruct-AWQ
  #     # CRITICAL: Force vLLM to use GPU 0 (3090 Ti) - docker device_ids remaps to 0
  #     - CUDA_VISIBLE_DEVICES=0
  #     # Ray integration for training detection
  #     - RAY_ADDRESS=http://ray-head:8265
  #     - RAY_CHECK_INTERVAL_SECONDS=10
  #     - YIELD_ON_TRAINING=true
  #     # Idle timeout: unload model after 60 min of no requests to free GPU
  #     # Set to 0 to disable idle timeout
  #     - IDLE_TIMEOUT_MINUTES=60
  #     - IDLE_CHECK_INTERVAL_SECONDS=60
  #     # Warmup: send periodic requests to keep model warm when training is not active
  #     - WARMUP_ENABLED=true
  #     - WARMUP_INTERVAL_MINUTES=15
  #     # Model settings - 4K context is the practical max for 32B on 24GB
  #     # Model weights: ~18GB, KV cache for 4K: ~1GB, leaves some overhead
  #     - MAX_MODEL_LEN=4096
  #     - GPU_MEMORY_UTILIZATION=0.92
  #     # Model cache
  #     - HF_HOME=/models
  #     - HF_TOKEN=${HF_TOKEN:-}
  #     - TRANSFORMERS_OFFLINE=0
  #     # Database for memory system
  #     - DATABASE_URL=postgresql://inference:${SHARED_DB_PASSWORD}@postgres:5432/inference
  #     # API settings
  #     - HOST=0.0.0.0
  #     - PORT=8000
  #   volumes:
  #     - hf-model-cache:/models
  #     - ./logs:/app/logs
  #   networks:
  #     - platform
  #   expose:
  #     - "8000"
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "8.0"
  #         memory: 32G
  #       reservations:
  #         cpus: "4.0"
  #         memory: 16G
  #         devices:
  #           - driver: nvidia
  #             device_ids: ["0"]
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
  #     interval: 60s
  #     timeout: 30s
  #     retries: 3
  #     start_period: 300s
  #   labels:
  #     - "traefik.enable=true"
  #     # Primary router - higher priority, only routes when healthy
  #     - "traefik.http.routers.coding-model-primary.rule=PathPrefix(`/api/coding`)"
  #     - "traefik.http.routers.coding-model-primary.priority=210"
  #     - "traefik.http.routers.coding-model-primary.entrypoints=web,websecure"
  #     - "traefik.http.services.coding-model-primary.loadbalancer.server.port=8000"
  #     - "traefik.http.services.coding-model-primary.loadbalancer.healthcheck.path=/health"
  #     - "traefik.http.services.coding-model-primary.loadbalancer.healthcheck.interval=10s"
  #     - "traefik.http.middlewares.coding-strip.stripprefix.prefixes=/api/coding"
  #     - "traefik.http.routers.coding-model-primary.middlewares=oauth2-errors,oauth2-auth,role-auth-developer,coding-strip"

  # ===========================================================================
  # Fallback Model: RTX 2070 (GPU 1)
  # Always available, handles requests when primary is yielded to training
  # ===========================================================================
  coding-model-fallback:
    image: ${SHML_REGISTRY_IMAGE_PREFIX:-shml/local}/coding-model-fallback:${SHML_IMAGE_TAG:-latest}
    pull_policy: ${SHML_IMAGE_PULL_POLICY:-missing}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coding-model-fallback
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      # Mode: fallback-only
      - MODEL_MODE=fallback
      # Qwen2.5-Coder-3B AWQ - fits in 8GB VRAM (7B is too large)
      # AWQ 4-bit: ~2GB VRAM, leaves plenty for KV cache
      - MODEL_ID=Qwen/Qwen2.5-Coder-3B-Instruct-AWQ
      # CRITICAL: Force vLLM to use GPU 1 (2070) - docker device_ids remaps to 0
      - CUDA_VISIBLE_DEVICES=0
      # No Ray monitoring needed - always available
      - RAY_ADDRESS=http://ray-head:8265
      - YIELD_ON_TRAINING=false
      # Model settings (optimized for 8GB VRAM)
      # 3B AWQ ~2GB weights + KV cache for 8K context
      - MAX_MODEL_LEN=8192
      - GPU_MEMORY_UTILIZATION=0.70
      - QUANTIZATION=awq
      # Model cache
      - HF_HOME=/models
      - HF_TOKEN=${HF_TOKEN:-}
      - TRANSFORMERS_OFFLINE=0
      # Database for memory system (shared with primary)
      - DATABASE_URL=postgresql://inference:${SHARED_DB_PASSWORD}@postgres:5432/inference
      # API settings
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - hf-model-cache:/models
      - ./logs:/app/logs
    networks:
      - platform
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 16G
        reservations:
          cpus: "2.0"
          memory: 8G
          devices:
            - driver: nvidia
              device_ids: [ "1" ]
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/health" ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s # Faster startup for smaller model
    labels:
      - "traefik.enable=true"
      # Fallback router - lower priority, catches requests when primary unhealthy
      - "traefik.http.routers.coding-model-fallback.rule=PathPrefix(`/api/coding`)"
      - "traefik.http.routers.coding-model-fallback.priority=200"
      - "traefik.http.routers.coding-model-fallback.entrypoints=web,websecure"
      - "traefik.http.services.coding-model-fallback.loadbalancer.server.port=8000"
      - "traefik.http.services.coding-model-fallback.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.coding-model-fallback.loadbalancer.healthcheck.interval=10s"
      # Re-use the same strip middleware
      - "traefik.http.routers.coding-model-fallback.middlewares=oauth2-errors,oauth2-auth,role-auth-developer,coding-strip"

volumes:
  hf-model-cache:
    external: true

networks:
  platform:
    name: ${PLATFORM_PREFIX:-shml}-platform
    external: true
