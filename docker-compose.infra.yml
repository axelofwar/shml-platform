# ML Platform - Shared Infrastructure
# Contains: API Gateway, Shared Databases, Unified Monitoring, Auth
# Can be started independently or via main docker-compose.yml

services:
  # ==========================================================================
  # API GATEWAY & ROUTING
  # ==========================================================================
  traefik:
    image: traefik:v2.11
    container_name: ml-platform-traefik
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.49'
          memory: 385M
        reservations:
          cpus: '0.25'
          memory: 128M
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=ml-platform
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --log.level=WARN
      - --accesslog=true
      - --metrics.prometheus=true
      - --ping=true
    ports:
      # LAN IP and localhost - Tailscale Funnel handles external HTTPS
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "10.0.0.163:80:80"
      - "10.0.0.163:443:443"
      - "0.0.0.0:8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./secrets/sfml-platform.tail38b60a.ts.net.crt:/etc/traefik/certs/sfml-platform.tail38b60a.ts.net.crt:ro
      - ./secrets/sfml-platform.tail38b60a.ts.net.key:/etc/traefik/certs/sfml-platform.tail38b60a.ts.net.key:ro
    networks:
      - ml-platform
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=PathPrefix(`/traefik`)"
      - "traefik.http.routers.traefik.entrypoints=web,websecure"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
      # SECURITY: Protect Traefik dashboard with OAuth2 - requires authentication
      - "traefik.http.routers.traefik.middlewares=oauth2-errors,oauth2-auth"

  # ==========================================================================
  # SHARED DATA LAYER
  # ==========================================================================
  shared-postgres:
    image: postgres:15-alpine
    container_name: shared-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 384M
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/shared_db_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - shared-postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
      - ./backups/postgres:/backups
    secrets:
      - shared_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-platform
    expose:
      - "5432"

  ml-platform-redis:
    image: redis:7-alpine
    container_name: ml-platform-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.34'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    command: redis-server --maxmemory 400mb --maxmemory-policy allkeys-lru --appendonly yes --save 60 1000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ml-platform
    expose:
      - "6379"

  # ==========================================================================
  # FUSIONAUTH - OAuth/SSO (Primary Auth Provider)
  # ==========================================================================
  fusionauth:
    image: fusionauth/fusionauth-app:1.52.0
    container_name: fusionauth
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    environment:
      DATABASE_URL: jdbc:postgresql://shared-postgres:5432/fusionauth
      DATABASE_ROOT_USERNAME: postgres
      DATABASE_ROOT_PASSWORD: ${SHARED_DB_PASSWORD}
      DATABASE_USERNAME: fusionauth
      DATABASE_PASSWORD: ${SHARED_DB_PASSWORD}
      FUSIONAUTH_APP_MEMORY: 384M
      FUSIONAUTH_APP_RUNTIME_MODE: ${FUSIONAUTH_RUNTIME_MODE:-development}
      FUSIONAUTH_APP_URL: https://${PUBLIC_DOMAIN:-sfml-platform.tail38b60a.ts.net}/auth
      SEARCH_TYPE: database
    volumes:
      - fusionauth-config:/usr/local/fusionauth/config
    networks:
      - ml-platform
    ports:
      - "9011:9011"
    depends_on:
      shared-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9011/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      # Headers middleware to fix X-Forwarded-Proto for HTTPS
      - "traefik.http.middlewares.fusionauth-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.fusionauth-headers.headers.customrequestheaders.X-Forwarded-Port=443"
      # Main router for /auth paths
      - "traefik.http.routers.fusionauth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.fusionauth.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth.priority=200"
      - "traefik.http.middlewares.fusionauth-rewrite.replacepathregex.regex=^/auth(.*)"
      - "traefik.http.middlewares.fusionauth-rewrite.replacepathregex.replacement=$$1"
      - "traefik.http.routers.fusionauth.middlewares=fusionauth-headers,fusionauth-rewrite"
      # Additional routers for FusionAuth paths (it generates absolute paths from root)
      - "traefik.http.routers.fusionauth-admin.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.fusionauth-admin.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-admin.priority=150"
      - "traefik.http.routers.fusionauth-admin.middlewares=fusionauth-headers"
      - "traefik.http.routers.fusionauth-admin.service=fusionauth"
      - "traefik.http.routers.fusionauth-css.rule=PathPrefix(`/css`)"
      - "traefik.http.routers.fusionauth-css.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-css.priority=150"
      - "traefik.http.routers.fusionauth-css.service=fusionauth"
      - "traefik.http.routers.fusionauth-js.rule=PathPrefix(`/js`)"
      - "traefik.http.routers.fusionauth-js.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-js.priority=150"
      - "traefik.http.routers.fusionauth-js.service=fusionauth"
      - "traefik.http.routers.fusionauth-images.rule=PathPrefix(`/images`)"
      - "traefik.http.routers.fusionauth-images.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-images.priority=150"
      - "traefik.http.routers.fusionauth-images.service=fusionauth"
      - "traefik.http.routers.fusionauth-fonts.rule=PathPrefix(`/fonts`)"
      - "traefik.http.routers.fusionauth-fonts.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-fonts.priority=150"
      - "traefik.http.routers.fusionauth-fonts.service=fusionauth"
      # FusionAuth API endpoints
      - "traefik.http.routers.fusionauth-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.fusionauth-api.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-api.priority=100"
      - "traefik.http.routers.fusionauth-api.middlewares=fusionauth-headers"
      - "traefik.http.routers.fusionauth-api.service=fusionauth"
      - "traefik.http.routers.fusionauth-oauth.rule=PathPrefix(`/oauth2`)"
      - "traefik.http.routers.fusionauth-oauth.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-oauth.priority=150"
      - "traefik.http.routers.fusionauth-oauth.middlewares=fusionauth-headers"
      - "traefik.http.routers.fusionauth-oauth.service=fusionauth"
      - "traefik.http.routers.fusionauth-well-known.rule=PathPrefix(`/.well-known`)"
      - "traefik.http.routers.fusionauth-well-known.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-well-known.priority=150"
      - "traefik.http.routers.fusionauth-well-known.middlewares=fusionauth-headers"
      - "traefik.http.routers.fusionauth-well-known.service=fusionauth"
      # FusionAuth AJAX endpoints (admin UI uses these)
      - "traefik.http.routers.fusionauth-ajax.rule=PathPrefix(`/ajax`)"
      - "traefik.http.routers.fusionauth-ajax.entrypoints=web,websecure"
      - "traefik.http.routers.fusionauth-ajax.priority=150"
      - "traefik.http.routers.fusionauth-ajax.middlewares=fusionauth-headers"
      - "traefik.http.routers.fusionauth-ajax.service=fusionauth"
      - "traefik.http.services.fusionauth.loadbalancer.server.port=9011"

  # ==========================================================================
  # OAUTH2-PROXY - Forward Authentication for Protected Services
  # ==========================================================================
  # OAuth2-Proxy acts as a gatekeeper for all protected services.
  # It integrates with FusionAuth via OIDC and checks that users have valid roles.
  #
  # ROLE-BASED ACCESS CONTROL:
  # - Users MUST be registered to the OAuth2-Proxy application in FusionAuth
  # - Users MUST have at least one role: admin, developer, or viewer
  # - If a user authenticates but has no role, they see an "access denied" message
  # - Self-registration is disabled - admins must create users and assign roles
  #
  # To grant access to a new user:
  # 1. Create user in FusionAuth (Users -> Add)
  # 2. Add registration for OAuth2-Proxy application
  # 3. Assign at least "viewer" role
  # ==========================================================================
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    # Allow container to resolve Tailscale domain to Tailscale IP
    # NOTE: Update TAILSCALE_IP in .env after any Tailscale reset
    extra_hosts:
      - "${PUBLIC_DOMAIN:-sfml-platform.tail38b60a.ts.net}:${TAILSCALE_IP:-100.66.26.115}"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      # Provider configuration - FusionAuth as OIDC provider
      OAUTH2_PROXY_PROVIDER: oidc
      # Issuer URL without /auth since we route /.well-known and /oauth2 directly to FusionAuth
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://${PUBLIC_DOMAIN:-sfml-platform.tail38b60a.ts.net}
      OAUTH2_PROXY_CLIENT_ID: ${FUSIONAUTH_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${FUSIONAUTH_PROXY_CLIENT_SECRET}

      # Cookie configuration
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_DOMAINS: "${PUBLIC_DOMAIN:-sfml-platform.tail38b60a.ts.net}"
      OAUTH2_PROXY_COOKIE_NAME: "_sfml_oauth2"

      # Redirect and URL configuration - using /oauth2-proxy prefix to avoid conflict with FusionAuth's /oauth2
      OAUTH2_PROXY_REDIRECT_URL: https://${PUBLIC_DOMAIN:-sfml-platform.tail38b60a.ts.net}/oauth2-proxy/callback
      OAUTH2_PROXY_WHITELIST_DOMAINS: "${PUBLIC_DOMAIN:-sfml-platform.tail38b60a.ts.net}"
      # Proxy prefix - tells oauth2-proxy to use /oauth2-proxy instead of default /oauth2
      OAUTH2_PROXY_PROXY_PREFIX: "/oauth2-proxy"

      # Upstream configuration (for auth verification only)
      OAUTH2_PROXY_UPSTREAMS: "static://200"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"

      # OIDC scope - request roles from FusionAuth
      # FusionAuth includes 'roles' claim in id_token by default for registered users
      OAUTH2_PROXY_SCOPE: "openid email profile"

      # ROLE-BASED ACCESS CONTROL
      # Use FusionAuth's native 'roles' claim (not groups)
      # oauth2-proxy treats roles as groups internally
      OAUTH2_PROXY_OIDC_GROUPS_CLAIM: "roles"

      # NOTE: ALLOWED_GROUPS temporarily disabled for debugging
      # FusionAuth requires JWT Populate lambda to include roles in id_token
      # Re-enable after confirming lambda is configured:
      # OAUTH2_PROXY_ALLOWED_GROUPS: "admin,developer,viewer"

      # Access control - NO public registration, email domain not restricted
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "false"

      # Headers to pass to upstream services
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"

      # Session configuration
      OAUTH2_PROXY_SESSION_STORE_TYPE: "cookie"
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: "^/auth/.*,^/health.*,^/api/status.*"

      # Custom templates for better user experience
      # Show clear message when user lacks required role
      OAUTH2_PROXY_CUSTOM_SIGN_IN_LOGO: "-"
      OAUTH2_PROXY_BANNER: "-"
      OAUTH2_PROXY_FOOTER: "SFML Platform - Contact your administrator if you need access"

      # Custom templates directory for error pages
      OAUTH2_PROXY_CUSTOM_TEMPLATES_DIR: "/templates"
    volumes:
      - ./oauth2-proxy/templates:/templates:ro
    networks:
      - ml-platform
    depends_on:
      fusionauth:
        condition: service_healthy
    # Note: oauth2-proxy is a scratch/distroless image with no shell tools
    # Using disable healthcheck so Traefik uses container running status instead
    healthcheck:
      disable: true
    labels:
      - "traefik.enable=true"
      # Headers middleware to ensure X-Forwarded-Proto is https (Tailscale Funnel terminates TLS)
      - "traefik.http.middlewares.oauth2-proxy-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.oauth2-proxy-headers.headers.customrequestheaders.X-Forwarded-Port=443"
      # OAuth2-Proxy routes - using /oauth2-proxy prefix to avoid conflict with FusionAuth's /oauth2
      # OAuth2-Proxy handles the /oauth2-proxy prefix internally via OAUTH2_PROXY_PROXY_PREFIX
      - "traefik.http.routers.oauth2-proxy.rule=PathPrefix(`/oauth2-proxy`)"
      - "traefik.http.routers.oauth2-proxy.entrypoints=web,websecure"
      - "traefik.http.routers.oauth2-proxy.priority=300"
      - "traefik.http.routers.oauth2-proxy.middlewares=oauth2-proxy-headers"
      - "traefik.http.services.oauth2-proxy.loadbalancer.server.port=4180"

      # Forward auth middleware - other services use this to verify auth
      # OAuth2-Proxy serves auth endpoint at /oauth2-proxy/auth due to PROXY_PREFIX setting
      - "traefik.http.middlewares.oauth2-auth.forwardauth.address=http://oauth2-proxy:4180/oauth2-proxy/auth"
      - "traefik.http.middlewares.oauth2-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.oauth2-auth.forwardauth.authResponseHeaders=X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups,Authorization"

      # Error handling middleware - redirects 401/403 to OAuth2 sign-in page
      # This is CRITICAL: without this, users see "Unauthorized" instead of being redirected to login
      # The {url} placeholder is replaced with the original request URL for redirect after login
      - "traefik.http.middlewares.oauth2-errors.errors.status=401-403"
      - "traefik.http.middlewares.oauth2-errors.errors.service=oauth2-proxy"
      - "traefik.http.middlewares.oauth2-errors.errors.query=/oauth2-proxy/sign_in?rd={url}"

  # ==========================================================================
  # SYSTEM MONITORING
  # ==========================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ml-platform-node-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.42'
          memory: 109M
        reservations:
          cpus: '0.05'
          memory: 32M
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - ml-platform
    expose:
      - "9100"
    pid: host

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ml-platform-cadvisor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.47'
          memory: 141M
        reservations:
          cpus: '0.1'
          memory: 64M
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - ml-platform
    expose:
      - "8080"
    privileged: true
    devices:
      - /dev/kmsg

  # ==========================================================================
  # UNIFIED MONITORING - Federated Prometheus + Grafana
  # ==========================================================================
  global-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: global-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/global-prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - global-prometheus-data:/prometheus
    expose:
      - "9090"
    networks:
      - ml-platform
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
      - "traefik.http.routers.prometheus.entrypoints=web,websecure"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.middlewares.prometheus-strip.stripprefix.prefixes=/prometheus"
      # OAuth2 protection - requires authentication for Prometheus
      # oauth2-errors redirects 401/403 to login page, oauth2-auth checks authentication
      - "traefik.http.routers.prometheus.middlewares=oauth2-errors,oauth2-auth,prometheus-strip"
      - "traefik.http.routers.prometheus.priority=100"

  unified-grafana:
    image: grafana/grafana:10.2.2
    container_name: unified-grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${PUBLIC_DOMAIN:-sfml-platform.tail38b60a.ts.net}/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
      # Anonymous access enabled for Ray Dashboard iframe embedding
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      # =====================================================================
      # Ray Dashboard Embedding Configuration
      # Required for Ray Dashboard to display Grafana visualizations
      # See: https://docs.ray.io/en/latest/cluster/configure-manage-dashboard.html
      # =====================================================================
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      # X-Frame-Options must be disabled for iframe embedding
      GF_SECURITY_X_FRAME_OPTIONS: ""
      # FusionAuth OAuth integration
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "SFML Platform"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${FUSIONAUTH_GRAFANA_CLIENT_ID}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${FUSIONAUTH_GRAFANA_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
      # Auth URL uses public domain (browser redirect), token/api use internal docker network
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://${PUBLIC_DOMAIN:-sfml-platform.tail38b60a.ts.net}/oauth2/authorize"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://fusionauth:9011/oauth2/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://fusionauth:9011/oauth2/userinfo"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], 'platform-admins') && 'Admin' || contains(groups[*], 'grafana-users') && 'Editor' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards/:/var/lib/grafana/dashboards/:ro
      - unified-grafana-data:/var/lib/grafana
    secrets:
      - grafana_password
    expose:
      - "3000"
    networks:
      - ml-platform
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=web,websecure"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.priority=100"
      # OAuth2 protection - requires authentication for Grafana
      # oauth2-errors redirects 401/403 to login page, oauth2-auth checks authentication
      - "traefik.http.routers.grafana.middlewares=oauth2-errors,oauth2-auth"

  # ==========================================================================
  # OBSERVABILITY STACK - Quick Wins (Coolify-inspired patterns)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # DOZZLE - Real-time Docker Log Viewer
  # Aggregates logs from all containers with OAuth protection
  # --------------------------------------------------------------------------
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${DOZZLE_CPU_LIMIT:-0.25}'
          memory: ${DOZZLE_MEM_LIMIT:-128M}
        reservations:
          cpus: '0.05'
          memory: 64M
    environment:
      DOZZLE_BASE: /logs
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "status=running"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ml-platform
    healthcheck:
      # Dozzle image is scratch/distroless, use /healthcheck endpoint via curl from traefik
      disable: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=PathPrefix(`/logs`)"
      - "traefik.http.routers.dozzle.entrypoints=web,websecure"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
      - "traefik.http.routers.dozzle.priority=100"
      # OAuth2 protection - requires authentication for log viewing
      - "traefik.http.routers.dozzle.middlewares=oauth2-errors,oauth2-auth"

  # --------------------------------------------------------------------------
  # HOMER - Static Dashboard (Root Landing Page)
  # Lightweight static homepage with service links
  # https://github.com/bastienwirtz/homer
  # --------------------------------------------------------------------------
  homer:
    image: b4bz/homer:latest
    container_name: homer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
        reservations:
          cpus: '0.01'
          memory: 16M
    user: "1000:1000"
    environment:
      INIT_ASSETS: "0"  # Don't overwrite our config
    volumes:
      - ./monitoring/homer:/www/assets:ro
    networks:
      - ml-platform
    labels:
      - "traefik.enable=true"
      # Lowest priority - catch-all for root path
      - "traefik.http.routers.homer.rule=PathPrefix(`/`)"
      - "traefik.http.routers.homer.entrypoints=web,websecure"
      - "traefik.http.routers.homer.priority=1"
      - "traefik.http.services.homer.loadbalancer.server.port=8080"
      # OAuth protected - requires authentication like other services
      - "traefik.http.routers.homer.middlewares=oauth2-errors,oauth2-auth"

  # --------------------------------------------------------------------------
  # POSTGRES BACKUP - Automated Docker-based Database Backups
  # Runs scheduled backups with retention and notifications
  # --------------------------------------------------------------------------
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:15-alpine
    container_name: postgres-backup
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${BACKUP_CPU_LIMIT:-0.5}'
          memory: ${BACKUP_MEM_LIMIT:-256M}
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      POSTGRES_HOST: shared-postgres
      POSTGRES_DB: mlflow_db,ray_compute,inference,fusionauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/shared_db_password
      POSTGRES_EXTRA_OPTS: "-Z6 --format=custom"
      SCHEDULE: "${BACKUP_SCHEDULE:-0 2 * * *}"
      BACKUP_KEEP_DAYS: "${BACKUP_KEEP_DAYS:-7}"
      BACKUP_KEEP_WEEKS: "${BACKUP_KEEP_WEEKS:-4}"
      BACKUP_KEEP_MONTHS: "${BACKUP_KEEP_MONTHS:-6}"
      HEALTHCHECK_PORT: 8080
      # Webhook notification on backup completion (optional)
      WEBHOOK_URL: "${BACKUP_WEBHOOK_URL:-}"
      WEBHOOK_EXTRA_ARGS: ""
    volumes:
      - ./backups/postgres:/backups
    secrets:
      - shared_db_password
    networks:
      - ml-platform
    depends_on:
      shared-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 60s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # WEBHOOK DEPLOYER - GitHub Push-to-Deploy
  # Receives GitHub webhooks and triggers deployments with notifications
  # --------------------------------------------------------------------------
  webhook-deployer:
    image: almir/webhook:latest
    container_name: webhook-deployer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${WEBHOOK_CPU_LIMIT:-0.25}'
          memory: ${WEBHOOK_MEM_LIMIT:-128M}
        reservations:
          cpus: '0.05'
          memory: 64M
    command: ["-verbose", "-hooks=/etc/webhook/hooks.json", "-hotreload", "-urlprefix=webhook"]
    environment:
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      DEPLOY_EMAIL: "${DEPLOY_NOTIFICATION_EMAIL:-}"
    volumes:
      - ./scripts/webhook:/etc/webhook:ro
      - ./scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/opt/sfml-platform:ro
    networks:
      - ml-platform
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webhook.rule=PathPrefix(`/webhook`)"
      - "traefik.http.routers.webhook.entrypoints=web,websecure"
      - "traefik.http.services.webhook.loadbalancer.server.port=9000"
      - "traefik.http.routers.webhook.priority=100"
      # Webhooks should be publicly accessible (authenticated via secret)
      # Do NOT add oauth2-auth middleware here

secrets:
  shared_db_password:
    file: ./secrets/shared_db_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
  fusionauth_db_password:
    file: ./secrets/fusionauth_db_password.txt
  oauth2_proxy_cookie_secret:
    file: ./secrets/oauth2_proxy_cookie_secret.txt

volumes:
  # Shared Data
  redis-data:
    name: ml-platform-redis-data
  shared-postgres-data:
    name: shared-postgres-data

  # Monitoring
  global-prometheus-data:
    name: global-prometheus-data
  unified-grafana-data:
    name: unified-grafana-data

  # FusionAuth
  fusionauth-config:
    name: fusionauth-config

networks:
  ml-platform:
    name: ml-platform
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
