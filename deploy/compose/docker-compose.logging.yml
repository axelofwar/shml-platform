version: '3.8'

# Loki Log Aggregation Stack
# Collects logs from Ray, training jobs, and system services
# Accessible via Grafana at http://localhost/grafana/

services:
  loki:
    image: grafana/loki:2.9.3
    container_name: ${PLATFORM_PREFIX:-shml}-loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    # SECURITY: No direct port exposure - internal only (traefik.enable=false)
    # ports:
    #   - "3100:3100"  # REMOVED: was exposing Loki to all interfaces
    volumes:
      - ../../monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ../../monitoring/loki/data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - platform
    labels:
      - "traefik.enable=false"  # Internal service, access via Grafana datasource
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.3
    container_name: ${PLATFORM_PREFIX:-shml}-promtail
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    volumes:
      - ../../monitoring/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - ../../ray_compute/data/ray:/ray_logs:ro
      - ../../logs:/app_logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - platform
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=false"

networks:
  platform:
    name: ${PLATFORM_PREFIX:-shml}-platform
    external: true
