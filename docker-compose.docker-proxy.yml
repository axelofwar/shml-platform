# Docker Socket Proxy - Secure Docker API Access
# ================================================
# Replaces raw /var/run/docker.sock mounts with a restricted HTTP proxy.
# Only allows read operations (GET) on container endpoints.
# Write operations (POST/DELETE) are blocked by default.
#
# Services that need Docker access should set:
#   DOCKER_HOST=tcp://docker-proxy:2375
# instead of mounting /var/run/docker.sock
#
# Security: Prevents container escape via Docker socket exploitation.
# A compromised container cannot: start/stop containers, mount host volumes,
# exec into other containers, or read container env vars (inspect blocked).
#
# Usage:
#   docker compose -f docker-compose.docker-proxy.yml up -d

services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: ${PLATFORM_PREFIX:-shml}-docker-proxy
    restart: unless-stopped
    privileged: true  # Required to access Docker socket

    environment:
      # ---- READ-ONLY endpoints (GET only) ----
      CONTAINERS: 1       # GET /containers/json, /containers/{id}/json (list, basic info)
      IMAGES: 0            # Block image operations
      NETWORKS: 0          # Block network operations
      VOLUMES: 0           # Block volume operations
      SERVICES: 0          # Block swarm services
      TASKS: 0             # Block swarm tasks
      NODES: 0             # Block swarm nodes
      INFO: 1              # GET /info (Docker system info)
      VERSION: 1           # GET /version

      # ---- WRITE endpoints (POST/DELETE - ALL BLOCKED) ----
      POST: 0              # Block ALL POST operations (start, stop, exec, create)
      DELETE: 0            # Block ALL DELETE operations

      # ---- Dangerous endpoints (BLOCKED) ----
      EXEC: 0              # Block exec into containers
      ALLOW_START: 0       # Block container start
      ALLOW_STOP: 0        # Block container stop
      ALLOW_RESTARTS: 0    # Block container restart
      BUILD: 0             # Block image build
      COMMIT: 0            # Block container commit
      CONFIGS: 0           # Block configs
      DISTRIBUTION: 0      # Block distribution
      SECRETS: 0           # Block secrets
      SWARM: 0             # Block swarm

      # Logging
      LOG_LEVEL: warning

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - platform

    expose:
      - "2375"

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  platform:
    name: ${PLATFORM_PREFIX:-shml}-platform
    external: true
