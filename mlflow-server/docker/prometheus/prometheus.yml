global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ml-platform'
    service: 'mlflow'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Traefik Gateway metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
        labels:
          service: 'traefik-gateway'

  # Node Exporter - Host system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'host-system'

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'containers'

  # MLflow Server API metrics
  - job_name: 'mlflow-api'
    static_configs:
      - targets: ['mlflow-api:8000']
        labels:
          service: 'mlflow-api'
    metrics_path: '/metrics'

  # MLflow Server
  - job_name: 'mlflow-server'
    static_configs:
      - targets: ['mlflow-server:5000']
        labels:
          service: 'mlflow-server'
    metrics_path: '/metrics'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['mlflow-postgres:5432']
        labels:
          service: 'postgres'
