upstream mlflow_backend {
    server mlflow-server:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MLflow server with /mlflow prefix support
server {
    listen 80;
    server_name _;

    # Health check endpoint (nginx local - for container healthcheck AND external via Traefik)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Health check at /mlflow/health for Traefik routing (matches /mlflow/* path)
    location = /mlflow/health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # MLflow UI and static files - proxy /mlflow/* to MLflow backend
    # MLflow runs with --static-prefix /mlflow so it expects these paths
    location /mlflow {
        proxy_pass http://mlflow_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Rate limiting (relaxed for high-performance system)
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 30;
    }

    # API endpoints - these don't use /mlflow prefix
    location /api/2.0/mlflow {
        proxy_pass http://mlflow_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Relaxed rate limiting for API
        limit_req zone=api_limit burst=100 nodelay;
        limit_conn conn_limit 50;
    }

    # Artifact API endpoints
    location /api/2.0/mlflow-artifacts {
        proxy_pass http://mlflow_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Large file upload settings
        client_max_body_size 100G;
        proxy_request_buffering off;

        limit_req zone=upload_limit burst=10 nodelay;
        limit_conn conn_limit 10;
    }

    # Fallback - for any other paths, proxy to MLflow
    location / {
        proxy_pass http://mlflow_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

