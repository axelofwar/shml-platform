upstream mlflow_backend {
    server mlflow-server:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Redirect HTTP to HTTPS (if SSL enabled)
server {
    listen 80;
    server_name _;

    # Health check endpoint (no redirect)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other traffic to HTTPS
    # Uncomment when SSL is configured
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Temporary: Proxy to MLflow (remove when SSL enabled)
    location / {
        proxy_pass http://mlflow_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Rate limiting (relaxed for high-performance system)
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 30;
    }
}

