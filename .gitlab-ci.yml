# =============================================================================
# SHML Platform — GitLab CI/CD Pipeline
# =============================================================================
# Migrated from GitHub Actions (5 workflows → 1 pipeline).
# Runner is on the Docker network, so it can reach all services directly.
# =============================================================================

stages:
  - lint          # YAML, config, code style
  - validate      # compose syntax, secret hygiene  (was folded in lint)
  - test          # platform unit/mocked + training unit
  - security      # secret scan, dep audit
  - integration   # live tests (runner on Docker network)
  - build         # build + push container images to registry
  - deploy        # deploy to self-hosted production (manual gate)
  - smoke-test    # post-deploy health checks
  - mirror        # public mirror sync + GitLab variable sync
  - notify        # Telegram/webhook on pipeline result

# ---------------------------------------------------------------------------
# Default settings — shared across all jobs
# ---------------------------------------------------------------------------
default:
  image: python:3.11
  tags:
    - docker
    - shml

# ---------------------------------------------------------------------------
# Variables — common environment
# ---------------------------------------------------------------------------
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  DOCKER_BUILDKIT: "1"
  SHML_REGISTRY_IMAGE_PREFIX: "$CI_REGISTRY_IMAGE/containers"
  SHML_IMAGE_TAG: "$CI_COMMIT_SHA"

# ---------------------------------------------------------------------------
# Reusable before_script for Python test jobs
# ---------------------------------------------------------------------------
.python_test_setup: &python_test_setup
  before_script:
    - python -m pip install --upgrade pip
    - |
      for req in requirements.txt tests/requirements.txt mlflow-server/api/requirements.txt ray_compute/api/requirements.txt; do
        [ -f "$req" ] && pip install -r "$req" || true
      done

# ===========================================================================
# STAGE: lint
# ===========================================================================

yaml_lint:
  stage: lint
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - pip install yamllint
    - |
      yamllint -d '{extends: relaxed, rules: {line-length: disable, truthy: disable, document-start: disable, comments: disable, trailing-spaces: disable}}' \
        .gitlab-ci.yml \
        $(find .github/workflows -name '*.yml' 2>/dev/null) \
        $(find deploy -name 'docker-compose*.yml' 2>/dev/null) || true

config_validation:
  stage: validate
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - |
      # Ensure no .env files are committed
      if find . -name ".env" -not -name ".env.example" -type f -not -path "./.git/*" | grep -q .; then
        echo "ERROR: .env files should not be committed!"
        find . -name ".env" -not -name ".env.example" -type f -not -path "./.git/*"
        exit 1
      fi
      echo "✓ No .env files found in repository"
    - |
      # Ensure no secret files are committed
      if [ -d "secrets" ] && find secrets -type f -name "*.txt" | grep -q .; then
        echo "ERROR: Secret files should not be committed!"
        find secrets -type f -name "*.txt"
        exit 1
      fi
      echo "✓ No secret files found in repository"

docs_check:
  stage: validate
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - |
      [ ! -f "README.md" ] && echo "ERROR: README.md is required" && exit 1
      echo "✓ README.md exists"
    - |
      find . -name "*.md" -not -path "./.git/*" -not -path "./archived/*" | while read f; do
        dir=$(dirname "$f")
        grep -oE '\[.*\]\([^http][^)]+\)' "$f" 2>/dev/null | grep -oE '\([^)]+\)' | tr -d '()' | while read link; do
          link_file="${link%%#*}"
          if [ -n "$link_file" ] && [ ! -f "$dir/$link_file" ] && [ ! -f "$link_file" ]; then
            echo "Potential broken link in $f: $link"
          fi
        done
      done || true

# ===========================================================================
# STAGE: test
# ===========================================================================

unit_tests:
  stage: test
  <<: *python_test_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - pip install pytest pytest-asyncio pytest-cov httpx aiohttp pydantic fastapi
    - |
      if [ -d "tests/unit" ]; then
        pytest tests/unit/ -v --tb=short -x
      else
        echo "No unit tests directory found — OK"
      fi

chat_api_tests:
  stage: test
  <<: *python_test_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - pip install pytest pytest-asyncio httpx aiohttp pydantic fastapi starlette requests
    - |
      [ -f "tests/chat-api/requirements-test.txt" ] && pip install -r tests/chat-api/requirements-test.txt
      [ -f "inference/chat-api/requirements.txt" ] && pip install -r inference/chat-api/requirements.txt || true
    - |
      if [ -d "tests/chat-api" ]; then
        if python -c "from inference.chat_api.app import auth" 2>/dev/null; then
          pytest tests/chat-api/test_auth.py tests/chat-api/test_ask_only_mode.py \
            tests/chat-api/test_security_config.py -v --tb=short
        else
          echo "⚠️ inference.chat_api not available — running config-only tests"
          EXIT_CODE=0
          pytest tests/chat-api/test_security_config.py -v --tb=short \
            -k "not chat_ui and not all_chat_interfaces and not coding_model_primary and not compose_valid and not non_admin" \
            || EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 5 ]; then
            echo "No matching config tests — OK"
          elif [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi
        fi
      fi

rbac_tests:
  stage: test
  <<: *python_test_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - pip install pytest pytest-asyncio httpx pyyaml requests
    - |
      if [ -f "tests/chat-api/test_traefik_config.py" ]; then
        EXIT_CODE=0
        pytest tests/chat-api/test_traefik_config.py -v --tb=short \
          -k "not chat_ui and not coding_model_routes" \
          || EXIT_CODE=$?
        if [ "$EXIT_CODE" -eq 5 ]; then
          echo "No matching RBAC tests — OK"
        elif [ "$EXIT_CODE" -ne 0 ]; then
          exit "$EXIT_CODE"
        fi
      fi
    - |
      if [ -d "scripts/role-auth" ]; then
        echo "✓ role-auth service directory exists"
        cat scripts/role-auth/nginx.conf | grep -E "auth/(viewer|developer|admin)" && echo "✓ Role endpoints configured"
      fi
    - |
      if [ -f "deploy/compose/docker-compose.infra.yml" ]; then
        grep -A 20 "oauth2-proxy:" deploy/compose/docker-compose.infra.yml | grep -E "OAUTH2_PROXY|X-Auth-Request" && echo "✓ OAuth2-Proxy configured"
      fi

integration_tests_mocked:
  stage: test
  <<: *python_test_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - pip install pytest pytest-asyncio httpx aiohttp requests pyyaml
    - |
      if [ -d "tests/integration" ]; then
        EXIT_CODE=0
        pytest tests/integration/ -v --tb=short \
          -k "not live and not running" \
          --ignore=tests/integration/test_chat_api_live.py \
          --ignore=tests/integration/test_full_stack.py \
          --ignore=tests/integration/test_api_endpoints.py \
          --ignore=tests/integration/test_new_services.py \
          --ignore=tests/integration/test_observability.py \
          --ignore=tests/integration/test_inference_stack.py \
          --ignore=tests/integration/test_traefik_routing.py \
          || EXIT_CODE=$?
        if [ "$EXIT_CODE" -eq 5 ]; then
          echo "No mocked integration tests — OK"
        elif [ "$EXIT_CODE" -ne 0 ]; then
          exit "$EXIT_CODE"
        fi
      fi

# ===========================================================================
# STAGE: security
# ===========================================================================

secret_scan:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - apt-get update && apt-get install -y --no-install-recommends wget git ca-certificates
    - |
      GITLEAKS_VERSION="8.24.3"
      wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
      tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
      chmod +x gitleaks
    - ./gitleaks detect --source . --redact -v --config .gitleaks.toml --no-git || echo "⚠️ Gitleaks found findings (review above)"

dependency_scan:
  stage: security
  image: python:3.11-slim
  timeout: 10 minutes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  allow_failure: true
  script:
    - pip install pip-audit
    - |
      FAILED=""
      SCANNED=0
      while IFS= read -r req; do
        echo "Auditing: $req"
        SCANNED=$((SCANNED + 1))
        if ! timeout 60 pip-audit -r "$req" --ignore-vuln PYSEC-2022-43012 2>/dev/null; then
          echo "⚠️ Vulnerabilities found in $req"
          FAILED="$FAILED $req"
        fi
      done < <(find . -name "requirements*.txt" -type f -not -path "./.git/*")
      echo "Scanned $SCANNED requirements files"
      [ -n "$FAILED" ] && echo "⚠️ Issues in:$FAILED" || echo "✓ No vulnerabilities found"

hardcoded_secret_scan:
  stage: security
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - |
      if grep -rn --include="*.py" --include="*.sh" --include="*.yml" --include="*.yaml" \
        -E "(password|secret|api_key|token|credential)\s*=\s*['\"][^'\"]+['\"]" \
        --exclude-dir=".git" --exclude-dir="archived" --exclude-dir=".venv" . | \
        grep -v "example" | grep -v "placeholder" | grep -v "getenv" | grep -v "\.example" | \
        grep -v "your.password" | grep -v "<.*>" | head -20; then
        echo ""
        echo "⚠️ Potential hardcoded secrets found (review above)"
      else
        echo "✓ No obvious hardcoded secrets detected"
      fi

# ===========================================================================
# STAGE: integration  (live tests — runner is on the Docker network)
# ===========================================================================

chat_api_live_tests:
  stage: integration
  <<: *python_test_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  script:
    - pip install pytest pytest-asyncio httpx requests
    - |
      # Runner is on the Docker network — no Tailscale needed
      CHAT_URL="${CHAT_API_URL:-http://shml-chat-api:8000}"
      echo "Testing Chat API at: $CHAT_URL"
      if curl -sf "$CHAT_URL/health" > /dev/null 2>&1; then
        echo "Chat API is accessible!"
        CHAT_API_DIRECT_URL="$CHAT_URL" \
        CHAT_API_TEST_KEY="$FUSIONAUTH_DEVELOPER_KEY" \
        CHAT_API_ADMIN_KEY="$FUSIONAUTH_API_KEY" \
        CHAT_API_VIEWER_KEY="$FUSIONAUTH_VIEWER_KEY" \
        pytest tests/integration/test_chat_api_live.py -v --tb=short -m integration -x
      else
        echo "⚠️ Chat API not accessible — skipping live tests"
      fi

fusionauth_live_tests:
  stage: integration
  <<: *python_test_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  script:
    - pip install pytest httpx pydantic tenacity python-dotenv requests
    - |
      FA_URL="${FUSIONAUTH_URL:-http://fusionauth:9011}"
      echo "Testing FusionAuth at: $FA_URL"
      if curl -sf -H "Authorization: $FUSIONAUTH_API_KEY" "$FA_URL/api/status" > /dev/null 2>&1; then
        echo "FusionAuth is accessible!"
        FUSIONAUTH_URL="$FA_URL" \
        FUSIONAUTH_API_KEY="$FUSIONAUTH_API_KEY" \
        pytest tests/platform_sdk/test_integration.py -v --tb=short
      else
        echo "⚠️ FusionAuth not accessible — skipping live tests"
      fi

full_stack_live_tests:
  stage: integration
  <<: *python_test_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  script:
    - pip install pytest requests
    - |
      DOMAIN="${PUBLIC_DOMAIN}"
      echo "Testing service health on Docker network..."
      # Test services directly via container names (no external access needed)
      for svc_url in \
        "http://mlflow-server:5000/health|MLflow" \
        "http://unified-grafana:3000/grafana/|Grafana" \
        "http://ray-compute-ui:3000/ray/ui/|Ray UI"; do
        url="${svc_url%%|*}"
        name="${svc_url#*|}"
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
        if echo "$STATUS" | grep -qE "^(200|302|401|403)$"; then
          echo "✓ $name OK (status: $STATUS)"
        else
          echo "⚠️ $name returned status: $STATUS"
        fi
      done
    - |
      if [ -f "tests/integration/test_full_stack.py" ]; then
        PUBLIC_DOMAIN="${PUBLIC_DOMAIN}" \
        SKIP_LAN_TESTS="true" \
        pytest tests/integration/test_full_stack.py -v --tb=short -m "external or security" -x || true
      fi

# ===========================================================================
# STAGE: build
# ===========================================================================

compose_validate:
  stage: build
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - pip install pyyaml
    - |
      python3 -c "
      import yaml, sys
      files = [
        'deploy/compose/docker-compose.yml',
        'deploy/compose/docker-compose.infra.yml',
      ]
      ok = True
      for f in files:
        try:
          with open(f) as fh:
            data = yaml.safe_load(fh)
          if 'services' not in data:
            print(f'⚠️ {f}: no services key found')
          else:
            print(f'✓ {f}: {len(data[\"services\"])} services validated')
        except FileNotFoundError:
          print(f'⚠️ {f}: file not found (may be in different path)')
        except yaml.YAMLError as e:
          print(f'✗ {f}: YAML parse error: {e}')
          ok = False
      sys.exit(0 if ok else 1)
      "

container_registry_build:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
      changes:
        - .gitlab-ci.yml
        - inference/**/*
        - chat-ui-v2/**/*
        - deploy/compose/**/*.yml
        - scripts/ci/build_registry_images.sh
  before_script:
    - docker info
  script:
    - scripts/ci/build_registry_images.sh

# ===========================================================================
# STAGE: mirror
# ===========================================================================

path_a_sync_gitlab_variables:
  stage: mirror
  image: alpine:3.20
  rules:
    - if: '$PATH_A_SYNC_ENABLED == "true" && ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web")'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - apk add --no-cache bash curl python3
    - |
      if ! command -v infisical >/dev/null 2>&1; then
        echo "infisical CLI is required in the runner image/environment." >&2
        echo "Install it on your self-hosted runner, then re-run this job." >&2
        exit 1
      fi
  script:
    - bash scripts/security/sync_infisical_to_gitlab_vars.sh

public_mirror_sync:
  stage: mirror
  image: python:3.11
  rules:
    - if: '$PUBLIC_MIRROR_ENABLED == "true" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "api"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  variables:
    PUBLIC_MIRROR_OUTPUT_DIR: .public-mirror
    PUBLIC_MIRROR_BRANCH: public-mirror
    PUBLIC_MIRROR_PUBLISH: "false"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git ca-certificates
  script:
    - bash scripts/security/export_public_mirror.sh --output "$PUBLIC_MIRROR_OUTPUT_DIR" --report .public-mirror-report.txt
    - |
      if [[ "${PUBLIC_MIRROR_PUBLISH}" == "true" ]]; then
        GITLEAKS_VERSION="8.24.3"
        wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        chmod +x gitleaks
        ./gitleaks detect --source "$PUBLIC_MIRROR_OUTPUT_DIR" --no-git --redact --verbose
      else
        echo "PUBLIC_MIRROR_PUBLISH=false; skipping pre-publish gitleaks scan."
      fi
    - |
      if [[ "${PUBLIC_MIRROR_PUBLISH}" != "true" ]]; then
        echo "PUBLIC_MIRROR_PUBLISH=false; skipping GitHub publish step."
        exit 0
      fi
    - |
      if [[ -z "${PUBLIC_MIRROR_REPO_URL:-}" ]]; then
        echo "PUBLIC_MIRROR_REPO_URL is required when PUBLIC_MIRROR_PUBLISH=true" >&2
        exit 1
      fi
    - |
      if [[ -z "${PUBLIC_MIRROR_GITHUB_TOKEN:-}" ]]; then
        echo "PUBLIC_MIRROR_GITHUB_TOKEN is required when PUBLIC_MIRROR_PUBLISH=true" >&2
        exit 1
      fi
    - |
      cd "$PUBLIC_MIRROR_OUTPUT_DIR"
      git init
      git checkout -b "$PUBLIC_MIRROR_BRANCH"
      git config user.name "${PUBLIC_MIRROR_GIT_NAME:-SHML Mirror Bot}"
      git config user.email "${PUBLIC_MIRROR_GIT_EMAIL:-mirror-bot@shml.local}"
      git add .
      git commit -m "chore: sync public mirror from ${CI_COMMIT_SHA}"

      sanitized_repo_url="${PUBLIC_MIRROR_REPO_URL#https://}"
      remote_url="https://x-access-token:${PUBLIC_MIRROR_GITHUB_TOKEN}@${sanitized_repo_url}"
      git remote add origin "$remote_url"
      git push --force origin "$PUBLIC_MIRROR_BRANCH"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .public-mirror/
      - .public-mirror-report.txt

# ===========================================================================
# TRAINING LIBRARY — stages: lint, test, build
# Jobs only run when libs/training/** or .gitmodules changes.
# ===========================================================================

.training_changes: &training_changes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"'
      changes:
        - libs/training/**/*
        - .gitmodules

training:lint:
  stage: lint
  <<: *training_changes
  image: python:3.11-slim
  script:
    - pip install ruff black --quiet
    - |
      echo "=== ruff ==="
      ruff check libs/training/shml_training || echo "⚠️ ruff found issues (non-blocking)"
    - |
      echo "=== black --check ==="
      black --check libs/training/shml_training || echo "⚠️ black formatting issues (non-blocking)"

training:type-check:
  stage: validate
  <<: *training_changes
  image: python:3.11-slim
  allow_failure: true
  script:
    - pip install mypy --quiet
    - pip install -e libs/training --quiet
    - mypy libs/training/shml_training --ignore-missing-imports --no-error-summary || echo "⚠️ mypy found issues (non-blocking)"

training:unit-tests:
  stage: test
  <<: *training_changes
  image: python:3.11-slim
  script:
    - pip install -e libs/training pytest pytest-asyncio --quiet
    - |
      if [ -d "libs/training/tests" ]; then
        pytest libs/training/tests/ -v --tb=short
      else
        echo "No training tests yet — add tests under libs/training/tests/"
        echo "✓ Import check..."
        python3 -c "import shml_training; print('shml_training imports OK')"
      fi

training:build-image:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - libs/training/**/*
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      IMAGE="${CI_REGISTRY_IMAGE}/training:${CI_COMMIT_SHA}"
      LATEST="${CI_REGISTRY_IMAGE}/training:latest"
      docker build \
        -t "$IMAGE" \
        -t "$LATEST" \
        -f libs/training/Dockerfile \
        libs/training/ 2>/dev/null || (
        # No Dockerfile yet — build a minimal development image
        echo "FROM python:3.11-slim" > /tmp/Dockerfile.training
        echo "WORKDIR /app" >> /tmp/Dockerfile.training
        echo "COPY libs/training/ ." >> /tmp/Dockerfile.training
        echo "RUN pip install -e . --no-cache-dir" >> /tmp/Dockerfile.training
        docker build -f /tmp/Dockerfile.training -t "$IMAGE" -t "$LATEST" .
      )
      docker push "$IMAGE"
      docker push "$LATEST"
      echo "✓ Training image pushed: $IMAGE"

# ===========================================================================
# ROBOTICS — cross-project pipeline trigger
# Triggers shml/robotics pipeline; local jobs can be added below when
# robotics code lands in this monorepo.
# ===========================================================================

robotics:trigger-pipeline:
  stage: test
  trigger:
    project: shml/robotics
    strategy: depend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - robotics/**/*
      when: always

# ===========================================================================
# STAGE: deploy — push platform images + deploy to self-hosted server
# ===========================================================================

# ---------------------------------------------------------------------------
# deploy:registry-push
# Wraps scripts/ci/build_registry_images.sh for the main deploy path.
# Only runs on default branch or semver tags. Replaces container_registry_build
# (which stays in `build` stage for PR validation; this job is the authoritative
# registry push that runs AFTER all tests pass).
# ---------------------------------------------------------------------------
deploy:registry-push:
  stage: deploy
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    SHML_IMAGE_TAG: "$CI_COMMIT_SHA"
  needs:
    - job: container_registry_build
      optional: true   # allow deploy even if build job was skipped (no changes)
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - scripts/ci/build_registry_images.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  environment:
    name: registry
    url: $CI_REGISTRY

# ---------------------------------------------------------------------------
# deploy:production
# Runs on the self-hosted Docker-network runner; pulls latest images and
# restarts services via start_all_safe.sh.  Always manual to prevent
# accidental production restarts from every commit.
# ---------------------------------------------------------------------------
deploy:production:
  stage: deploy
  tags:
    - docker
    - shml
  needs:
    - job: deploy:registry-push
      optional: true
  when: manual
  allow_failure: false
  variables:
    GIT_STRATEGY: none   # runner already has the repo; no re-clone needed
  before_script:
    - cd "$CI_PROJECT_DIR"
    - git fetch origin "$CI_COMMIT_SHA"
    - git checkout "$CI_COMMIT_SHA"
  script:
    - |
      echo "=== Pulling latest images from registry ==="
      docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

      # Pull images that were just pushed by deploy:registry-push
      REGISTRY_PREFIX="${CI_REGISTRY_IMAGE}/containers"
      for image in \
        inference-gateway \
        chat-api \
        embedding-service \
        agent-service \
        coding-model-fallback \
        nemotron-coding; do
        docker pull "${REGISTRY_PREFIX}/${image}:${CI_COMMIT_SHA}" 2>/dev/null || \
          echo "⚠️ ${image} image not in registry (may not have changed)"
      done

    - |
      echo "=== Restarting platform services ==="
      ./start_all_safe.sh restart infra
      sleep 15
      ./start_all_safe.sh restart mlflow
      sleep 10
      ./start_all_safe.sh restart inference
  environment:
    name: production
    url: https://$PUBLIC_DOMAIN
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual

# ===========================================================================
# STAGE: smoke-test — verify platform is healthy after deploy
# Runs on the self-hosted runner which is on the Docker network.
# ===========================================================================

smoke-test:platform-health:
  stage: smoke-test
  tags:
    - docker
    - shml
  needs:
    - job: deploy:production
  variables:
    GIT_STRATEGY: none
  script:
    - |
      echo "=== Post-deploy smoke tests ==="
      PASS=0
      FAIL=0

      check() {
        local name="$1"
        local url="$2"
        local expected_codes="${3:-200 302 401 403}"
        local status
        status=$(docker run --rm --network ml-platform \
          alpine/curl:latest -s -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
        if echo "$expected_codes" | grep -qw "$status"; then
          echo "  ✓ $name ($status)"
          PASS=$((PASS+1))
        else
          echo "  ✗ $name — expected one of [$expected_codes], got $status"
          FAIL=$((FAIL+1))
        fi
      }

      check "Traefik (gateway)"    "http://shml-traefik:80/"
      check "MLflow (health)"      "http://mlflow-server:5000/health"            "200"
      check "Ray API (health)"     "http://ray-compute-api:8000/health"           "200"
      check "Chat API (health)"    "http://shml-chat-api:8000/health"             "200"
      check "FusionAuth (status)"  "http://fusionauth:9011/api/status"            "200"
      check "OAuth2-Proxy"         "http://oauth2-proxy:4180/ping"                "200"
      check "Grafana"              "http://unified-grafana:3000/grafana/api/health" "200"

      echo ""
      echo "Results: $PASS passed, $FAIL failed"
      [ "$FAIL" -eq 0 ] || exit 1
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success

# ===========================================================================
# STAGE: notify — Telegram/webhook on pipeline success or failure
# Uses TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID CI/CD variables.
# ===========================================================================

.notify_base: &notify_base
  stage: notify
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl --quiet
  variables:
    GIT_STRATEGY: none

notify:on-failure:
  <<: *notify_base
  when: on_failure
  script:
    - |
      if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ "$TELEGRAM_BOT_TOKEN" = "ci-dummy-telegram-token" ]; then
        echo "TELEGRAM_BOT_TOKEN not configured — skipping notification"
        exit 0
      fi
      MSG="❌ *SHML Platform CI FAILED*%0A"
      MSG="${MSG}Pipeline: \`${CI_PIPELINE_ID}\`%0A"
      MSG="${MSG}Branch: \`${CI_COMMIT_BRANCH:-${CI_COMMIT_TAG}}\`%0A"
      MSG="${MSG}Commit: \`${CI_COMMIT_SHA:0:8}\` — ${CI_COMMIT_TITLE}%0A"
      MSG="${MSG}[View pipeline](${CI_PIPELINE_URL})"
      curl -s -X POST \
        "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MSG}" \
        -d "parse_mode=Markdown" \
        -d "disable_web_page_preview=true" > /dev/null
      echo "Failure notification sent"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_failure
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: on_failure

notify:on-success:
  <<: *notify_base
  when: on_success
  script:
    - |
      if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ "$TELEGRAM_BOT_TOKEN" = "ci-dummy-telegram-token" ]; then
        echo "TELEGRAM_BOT_TOKEN not configured — skipping notification"
        exit 0
      fi
      MSG="✅ *SHML Platform CI passed*%0A"
      MSG="${MSG}Branch: \`${CI_COMMIT_BRANCH:-${CI_COMMIT_TAG}}\`%0A"
      MSG="${MSG}Commit: \`${CI_COMMIT_SHA:0:8}\` — ${CI_COMMIT_TITLE}%0A"
      MSG="${MSG}[View pipeline](${CI_PIPELINE_URL})"
      curl -s -X POST \
        "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MSG}" \
        -d "parse_mode=Markdown" \
        -d "disable_web_page_preview=true" > /dev/null
      echo "Success notification sent"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success

