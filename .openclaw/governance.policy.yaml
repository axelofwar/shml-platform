version: 1
updated_at: "2026-02-26"
owner: "platform-admin"

routing:
  default_mode: "cost-aware"
  availability:
    prefer_local_when:
      - "nemotron-local health endpoint is reachable"
      - "no non-llama compute process is active on GPU 0"
    fallback_to_remote_when:
      - "nemotron-local is unavailable"
      - "GPU 0 training/compute contention is detected"
  tier_order:
    - name: "local-fast"
      model: "nemotron-local/nemotron-coding"
      use_for:
        - "planning"
        - "scaffolding"
        - "status"
        - "documentation"
      constraints:
        max_turns: 6
        max_context_tokens: 12000
    - name: "remote-balanced"
      model: "github-copilot/claude-sonnet-4.6"
      use_for:
        - "normal-implementation"
        - "debugging"
      constraints:
        max_turns: 12
        max_context_tokens: 24000
    - name: "remote-premium"
      model: "github-copilot/claude-opus-4.6"
      use_for:
        - "complex-implementation"
        - "architecture"
        - "security-review"
      constraints:
        max_turns: 20
        max_context_tokens: 32000

  escalation:
    promote_to_balanced_when:
      - "local-fast fails 2 consecutive attempts"
      - "task has >2 files changed"
      - "task asks for tests + implementation"
    promote_to_premium_when:
      - "balanced fails 2 consecutive attempts"
      - "security-sensitive or multi-service refactor"
      - "explicit user override to premium"
    downgrade_when:
      - "premium task returns to maintenance or docs"
      - "budget pressure reaches soft threshold"

budget:
  accounting_currency: "USD"
  monthly_limit: 120
  soft_limit_percent: 70
  hard_limit_percent: 95
  enforcement:
    at_soft_limit: "disable premium tier unless override"
    at_hard_limit: "allow local-fast only; require admin override for remote tiers"

admin_controls:
  allow_cancel: true
  allow_emergency_stop: true
  allow_model_override: true
  require_reason_for_override: true
  max_concurrent_agent_runs: 2
  lockout_on_policy_violation: true

discord_controls:
  enabled: true
  channel: "discord"
  allowed_targets:
    - "channel:platform-admin"
  command_prefix: "!oc"
  allowed_commands:
    - "status"
    - "budget"
    - "cancel"
    - "override"
    - "resume"

audit:
  log_dir: ".openclaw/logs"
  decisions_log: ".openclaw/logs/governance-decisions.jsonl"
  overrides_log: ".openclaw/logs/governance-overrides.jsonl"

learning:
  enabled: true
  memory_file: ".openclaw/workspace-state.json"
  rules_file: ".openclaw/CONTEXT.md"
  capture:
    - "successful routing patterns"
    - "failed model attempts"
    - "manual overrides and outcomes"
  compaction: "weekly"
