# Infisical Secrets Manager
# Self-hosted secrets management for GitHub tokens, API keys, etc.
#
# Features:
# - Encrypted secrets at rest
# - Access control via API tokens
# - Audit logging
# - Zero-knowledge architecture
#
# Usage:
#   docker compose -f docker-compose.secrets.yml up -d

services:
  # ==========================================================================
  # INFISICAL - Self-Hosted Secrets Manager
  # ==========================================================================
  infisical:
    image: infisical/infisical:latest-postgres
    container_name: ${PLATFORM_PREFIX:-shml}-infisical
    restart: unless-stopped
    depends_on:
      infisical-postgres:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    environment:
      # Encryption keys (CRITICAL: set proper keys in .env, DO NOT use defaults)
      # Generate with: openssl rand -hex 16 (for ENCRYPTION_KEY)
      # Generate with: openssl rand -hex 32 (for AUTH_SECRET)
      - ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY:?ERROR: Set INFISICAL_ENCRYPTION_KEY in .env - generate with 'openssl rand -hex 16'}
      - AUTH_SECRET=${INFISICAL_AUTH_SECRET:?ERROR: Set INFISICAL_AUTH_SECRET in .env - generate with 'openssl rand -hex 32'}
      # Database
      - DB_CONNECTION_URI=postgres://infisical:${INFISICAL_DB_PASSWORD:-infisical-db-password}@infisical-postgres:5432/infisical
      # Redis for caching
      - REDIS_URL=redis://infisical-redis:6379
      # Site configuration
      - SITE_URL=${INFISICAL_SITE_URL:-https://shml-platform.tail38b60a.ts.net/secrets}
      - NEXT_PUBLIC_POSTHOG_API_KEY=
      - TELEMETRY_ENABLED=false
      # Initial admin setup
      - ADMIN_EMAIL=${INFISICAL_ADMIN_EMAIL:-admin@shml-platform.local}
    networks:
      - platform
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      # Infisical UI - admin access only
      - "traefik.http.routers.infisical.rule=PathPrefix(`/secrets`)"
      - "traefik.http.routers.infisical.entrypoints=web,websecure"
      - "traefik.http.routers.infisical.priority=100"
      - "traefik.http.services.infisical.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.infisical-strip.stripprefix.prefixes=/secrets"
      - "traefik.http.routers.infisical.middlewares=oauth2-errors,oauth2-auth,role-auth-admin,infisical-strip"

  # Infisical's dedicated PostgreSQL
  infisical-postgres:
    image: postgres:15-alpine
    container_name: ${PLATFORM_PREFIX:-shml}-infisical-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=infisical
      - POSTGRES_PASSWORD=${INFISICAL_DB_PASSWORD:-infisical-db-password}
      - POSTGRES_DB=infisical
    volumes:
      - infisical-postgres-data:/var/lib/postgresql/data
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Infisical's dedicated Redis
  infisical-redis:
    image: redis:7-alpine
    container_name: ${PLATFORM_PREFIX:-shml}-infisical-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - infisical-redis-data:/data
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  infisical-postgres-data:
    name: ${PLATFORM_PREFIX:-shml}-infisical-postgres-data
  infisical-redis-data:
    name: ${PLATFORM_PREFIX:-shml}-infisical-redis-data

networks:
  platform:
    name: ${PLATFORM_PREFIX:-shml}-platform
    external: true
