events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        server_name _;

        # Health check endpoint
        location /healthz {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Handle /ide requests
        location /ide/ {
            # Rewrite /ide/* to /* for code-server
            rewrite ^/ide/(.*) /$1 break;

            proxy_pass http://shml-code-server:8080;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
            proxy_set_header Accept-Encoding gzip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Rewrite redirects from code-server to include /ide prefix
            proxy_redirect / /ide/;
            proxy_redirect ~^/(.*)$ /ide/$1;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        # Handle /ide (without trailing slash) - redirect to /ide/
        location = /ide {
            return 301 /ide/;
        }
    }
}
