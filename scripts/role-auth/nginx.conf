# Role-based auth checker for Traefik forwardAuth
# Validates that X-Auth-Request-Groups contains required role

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Viewer access - any authenticated user with viewer, developer, elevated-developer, or admin role
        # Used for: Homer, Grafana
        location /auth/viewer {
            set $required_roles "viewer,developer,elevated-developer,admin";
            content_by_lua_block {
                local groups = ngx.req.get_headers()["X-Auth-Request-Groups"] or ""
                local required = ngx.var.required_roles

                -- Parse user's groups into a set for exact matching
                local user_roles = {}
                for token in string.gmatch(groups, "[^,]+") do
                    -- Trim whitespace from token
                    local trimmed = token:match("^%s*(.-)%s*$")
                    user_roles[trimmed] = true
                end

                -- Check if any required role is present
                for role in string.gmatch(required, "([^,]+)") do
                    local trimmed_role = role:match("^%s*(.-)%s*$")
                    if user_roles[trimmed_role] then
                        ngx.status = 200
                        ngx.header["X-Auth-Role-Check"] = "passed"
                        ngx.say("OK")
                        return
                    end
                end

                -- No matching role found
                ngx.status = 403
                ngx.header["X-Auth-Role-Check"] = "failed"
                ngx.header["X-Required-Roles"] = required
                ngx.say("Forbidden: requires one of: " .. required)
            }
        }

        # Developer access - requires developer, elevated-developer, or admin role
        # Used for: MLflow, Ray, Dozzle
        location /auth/developer {
            set $required_roles "developer,elevated-developer,admin";
            content_by_lua_block {
                local groups = ngx.req.get_headers()["X-Auth-Request-Groups"] or ""
                local required = ngx.var.required_roles

                -- Parse user's groups into a set for exact matching
                local user_roles = {}
                for token in string.gmatch(groups, "[^,]+") do
                    -- Trim whitespace from token
                    local trimmed = token:match("^%s*(.-)%s*$")
                    user_roles[trimmed] = true
                end

                -- Check if any required role is present
                for role in string.gmatch(required, "([^,]+)") do
                    local trimmed_role = role:match("^%s*(.-)%s*$")
                    if user_roles[trimmed_role] then
                        ngx.status = 200
                        ngx.header["X-Auth-Role-Check"] = "passed"
                        ngx.say("OK")
                        return
                    end
                end

                ngx.status = 403
                ngx.header["X-Auth-Role-Check"] = "failed"
                ngx.header["X-Required-Roles"] = required
                ngx.say("Forbidden: requires one of: " .. required .. ". Contact admin to request access.")
            }
        }

        # Elevated developer access - requires elevated-developer or admin role
        # Used for: GitHub actions, model management, agent tools
        location /auth/elevated-developer {
            set $required_roles "elevated-developer,admin";
            content_by_lua_block {
                local groups = ngx.req.get_headers()["X-Auth-Request-Groups"] or ""
                local required = ngx.var.required_roles

                -- Parse user's groups into a set for exact matching
                local user_roles = {}
                for token in string.gmatch(groups, "[^,]+") do
                    -- Trim whitespace from token
                    local trimmed = token:match("^%s*(.-)%s*$")
                    user_roles[trimmed] = true
                end

                -- Check if any required role is present
                for role in string.gmatch(required, "([^,]+)") do
                    local trimmed_role = role:match("^%s*(.-)%s*$")
                    if user_roles[trimmed_role] then
                        ngx.status = 200
                        ngx.header["X-Auth-Role-Check"] = "passed"
                        ngx.say("OK")
                        return
                    end
                end

                ngx.status = 403
                ngx.header["X-Auth-Role-Check"] = "failed"
                ngx.header["X-Required-Roles"] = required
                ngx.say("Forbidden: requires elevated-developer or admin role. Contact admin to request elevation.")
            }
        }

        # Admin access - requires admin role only
        # Used for: Traefik dashboard, system administration, host access
        location /auth/admin {
            set $required_roles "admin";
            content_by_lua_block {
                local groups = ngx.req.get_headers()["X-Auth-Request-Groups"] or ""
                local required = ngx.var.required_roles

                -- Parse user's groups into a set for exact matching
                local user_roles = {}
                for token in string.gmatch(groups, "[^,]+") do
                    -- Trim whitespace from token
                    local trimmed = token:match("^%s*(.-)%s*$")
                    user_roles[trimmed] = true
                end

                -- Check if any required role is present
                for role in string.gmatch(required, "([^,]+)") do
                    local trimmed_role = role:match("^%s*(.-)%s*$")
                    if user_roles[trimmed_role] then
                        ngx.status = 200
                        ngx.header["X-Auth-Role-Check"] = "passed"
                        ngx.say("OK")
                        return
                    end
                end

                ngx.status = 403
                ngx.header["X-Auth-Role-Check"] = "failed"
                ngx.header["X-Required-Roles"] = required
                ngx.say("Forbidden: requires admin role. Contact platform administrator.")
            }
        }
    }
}
