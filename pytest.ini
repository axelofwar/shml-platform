[pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring running services
    unit: marks pure unit tests (no services needed)
    security: marks security validation tests
    gpu: marks tests requiring GPU hardware
    external: marks tests requiring external network access
    inference: marks inference service tests
    observability: marks monitoring/metrics tests
    authenticated: marks tests requiring OAuth tokens
    chat_api: marks Chat API specific tests
