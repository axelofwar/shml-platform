# Ray Compute Prometheus Configuration
# Scrapes: Ray head node, Ray workers, Ray API metrics
# Retention: 7 days (high-cardinality Ray metrics)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ml-platform'
    service: 'ray-compute'

scrape_configs:
  # Ray Head Node Metrics
  - job_name: 'ray-head'
    static_configs:
      - targets: ['ray-head:8080']
        labels:
          component: 'ray-head'
          instance: 'ray-head-node'
  
  # Ray Dashboard Metrics
  - job_name: 'ray-dashboard'
    metrics_path: '/api/prometheus_metrics'
    static_configs:
      - targets: ['ray-head:8265']
        labels:
          component: 'ray-dashboard'
  
  # Ray Compute API Metrics
  - job_name: 'ray-compute-api'
    static_configs:
      - targets: ['ray-compute-api:8000']
        labels:
          component: 'ray-api'
