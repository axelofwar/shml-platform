version: '3.8'

services:
  # PostgreSQL for Authentik
  authentik-db:
    image: postgres:15-alpine
    container_name: authentik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD:-change_me_in_production}
    volumes:
      - authentik-db:/var/lib/postgresql/data
    networks:
      - authentik
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Authentik
  authentik-redis:
    image: redis:7-alpine
    container_name: authentik-redis
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik-redis:/data
    networks:
      - authentik
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Authentik Server
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.8
    container_name: authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-change_me_in_production}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"  # Privacy: No telemetry
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"       # Privacy: No phone home
      AUTHENTIK_AVATARS: "gravatar,initials"
    volumes:
      - authentik-media:/media
      - authentik-custom-templates:/templates
    networks:
      - authentik
      - ray-compute
    ports:
      - "9000:9000"   # HTTP (use with Tailscale)
      - "9443:9443"   # HTTPS (optional)
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  # Authentik Worker
  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.8
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-change_me_in_production}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
    volumes:
      - authentik-media:/media
      - authentik-certs:/certs
      - authentik-custom-templates:/templates
    networks:
      - authentik
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  # Redis for Ray Compute Queue
  ray-redis:
    image: redis:7-alpine
    container_name: ray-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ray-redis:/data
    networks:
      - ray-compute
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  authentik:
    name: authentik
    driver: bridge
  ray-compute:
    name: ray-compute
    driver: bridge
    external: false

volumes:
  authentik-db:
    name: authentik-postgres-data
  authentik-redis:
    name: authentik-redis-data
  authentik-media:
    name: authentik-media
  authentik-certs:
    name: authentik-certs
  authentik-custom-templates:
    name: authentik-templates
  ray-redis:
    name: ray-redis-data
