version: '3.8'

services:
  ray-compute-ui:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://${TAILSCALE_IP:-localhost}:8000
        - NEXT_PUBLIC_AUTHENTIK_URL=http://${TAILSCALE_IP:-localhost}:9000
    container_name: ray-compute-ui
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://${TAILSCALE_IP:-localhost}:8000
      - NEXT_PUBLIC_AUTHENTIK_URL=http://${TAILSCALE_IP:-localhost}:9000
      - AUTHENTIK_URL=http://authentik-server:9000
      - NEXTAUTH_URL=http://${TAILSCALE_IP:-localhost}:3002
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTHENTIK_CLIENT_ID=ray-compute-api
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}
    ports:
      - "3002:3000"
    networks:
      - ray-compute
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ray-compute:
    name: ray-compute
    external: true
