# Notification Configuration for Ray Compute
# Supports multiple backends via Apprise (zero cost)

# Email via Gmail (free tier)
# mailto://username:password@gmail.com

# Telegram Bot (free, no limits)
# tgram://YOUR_BOT_TOKEN/YOUR_CHAT_ID
# Setup: https://core.telegram.org/bots#6-botfather

# ntfy.sh (self-hosted or public, free push notifications)
# ntfy://YOUR_TOPIC
# Install app: https://ntfy.sh/

# Discord Webhook (free)
# discord://webhook_id/webhook_token

# Slack Webhook (free tier)
# slack://TokenA/TokenB/TokenC

# =============================================================================
# CONFIGURATION
# =============================================================================

[general]
# Enable/disable notifications globally
enabled = true

# Default notification backends (comma-separated)
# Will try each in order until one succeeds
default_backends = ntfy

# Rate limiting (max notifications per hour)
max_notifications_per_hour = 100

[admin]
# Admin-specific notification settings
# Receives: job failures, system alerts, storage warnings
backends = ntfy://ray-compute-admin

# Alert levels: info, warning, critical
min_severity = warning

[user]
# User notification settings
# Receives: job completion, job failures
backends = ntfy://ray-compute-jobs

# Users can only receive their own job notifications
min_severity = info

[system]
# System-wide alerts (GPU temp, storage, services down)
backends = ntfy://ray-compute-system

# Critical alerts always sent regardless of rate limit
min_severity = critical

# =============================================================================
# NOTIFICATION TEMPLATES
# =============================================================================

[templates]
job_completed = """
✅ Job Completed: {job_name}

Job ID: {job_id}
User: {username}
Runtime: {runtime}
Status: SUCCESS

Artifacts: {artifact_size}
"""

job_failed = """
❌ Job Failed: {job_name}

Job ID: {job_id}
User: {username}
Runtime: {runtime}
Error: {error_message}

Check logs: http://${TAILSCALE_IP:-localhost}:8266/jobs/{job_id}/logs
"""

storage_warning = """
⚠️ Storage Warning

Current usage: {usage_percent}%
Available: {available_gb}GB
Threshold: 90%

Action: Cleanup recommended
"""

storage_critical = """
🚨 STORAGE CRITICAL

Current usage: {usage_percent}%
Available: {available_gb}GB
Threshold: 95%

Action: IMMEDIATE cleanup required!
Jobs may fail due to insufficient storage.
"""

gpu_temperature_high = """
🌡️ GPU Temperature High

GPU: {gpu_name}
Temperature: {temperature}°C
Threshold: 80°C

Status: Monitoring
"""

gpu_temperature_critical = """
🔥 GPU TEMPERATURE CRITICAL

GPU: {gpu_name}
Temperature: {temperature}°C
Threshold: 85°C

Action: Throttling may occur. Consider reducing load.
"""

service_down = """
🔴 Service Down

Service: {service_name}
Last seen: {last_seen}
Duration: {downtime}

Action: Investigating...
"""

job_timeout_warning = """
⏰ Job Timeout Warning

Job ID: {job_id}
Name: {job_name}
Runtime: {runtime_hours}h / {max_hours}h

Approaching {max_hours}-hour limit.
"""

user_quota_exceeded = """
🚫 Quota Exceeded

User: {username}
Quota: {quota_type}
Current: {current_usage}
Limit: {quota_limit}

New jobs will be rejected until usage decreases.
"""

# =============================================================================
# BACKEND-SPECIFIC SETTINGS
# =============================================================================

[ntfy]
# Self-hosted ntfy server (recommended for privacy)
# server_url = http://localhost:8080
server_url = https://ntfy.sh

# Topics (create unique topics for your instance)
admin_topic = ray-compute-admin-YOUR_UNIQUE_ID
user_topic = ray-compute-jobs-YOUR_UNIQUE_ID
system_topic = ray-compute-system-YOUR_UNIQUE_ID

# Priority mapping
priority_map = {
    "info": "default",
    "warning": "high",
    "critical": "urgent"
}

[telegram]
# Create bot: https://t.me/botfather
# Get chat_id: https://api.telegram.org/bot<TOKEN>/getUpdates
bot_token = YOUR_BOT_TOKEN_HERE
chat_id = YOUR_CHAT_ID_HERE

[email]
# Gmail SMTP (requires app password if 2FA enabled)
smtp_server = smtp.gmail.com
smtp_port = 587
from_email = your-email@gmail.com
password = YOUR_APP_PASSWORD
to_email = your-email@gmail.com

[discord]
# Create webhook in server settings
webhook_url = YOUR_DISCORD_WEBHOOK_URL

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================

# Option 1: ntfy.sh (Recommended - Easiest)
# ----------------------------------------
# 1. Install ntfy app on phone: https://ntfy.sh/
# 2. Choose unique topic names (replace YOUR_UNIQUE_ID with random string)
# 3. Subscribe to topics in app
# 4. Test: curl -d "Test message" ntfy.sh/ray-compute-admin-YOUR_UNIQUE_ID
# 5. Update admin_topic, user_topic, system_topic above

# Option 2: Self-hosted ntfy (Most Private)
# -----------------------------------------
# 1. Run: docker run -p 8080:80 binwiederhier/ntfy serve
# 2. Update server_url to http://localhost:8080
# 3. Follow steps 2-5 from Option 1

# Option 3: Telegram (Good balance)
# ---------------------------------
# 1. Create bot: Chat with @BotFather on Telegram
# 2. Get bot token from BotFather
# 3. Start chat with your bot
# 4. Get chat ID: curl https://api.telegram.org/bot<TOKEN>/getUpdates
# 5. Update bot_token and chat_id above

# Option 4: Email (Fallback)
# --------------------------
# 1. Generate app password: https://myaccount.google.com/apppasswords
# 2. Update from_email, password, to_email above

# Test notifications:
# python3 -c "from api.notifications import send_notification; send_notification('test', 'Test message')"
