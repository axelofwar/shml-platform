server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Ray Compute API logs
  - job_name: ray-compute-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: ray-compute-api
          __path__: /app/logs/api*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            job_id: job_id
            user_id: user_id
      - labels:
          level:
          job_id:
          user_id:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # Ray logs
  - job_name: ray
    static_configs:
      - targets:
          - localhost
        labels:
          job: ray
          __path__: /opt/ray/logs/**/*.log
    pipeline_stages:
      - match:
          selector: '{job="ray"}'
          stages:
            - regex:
                expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})\s+(?P<level>\w+)\s+(?P<message>.*)'
            - labels:
                level:
            - timestamp:
                source: timestamp
                format: '2006-01-02 15:04:05,000'

  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
    pipeline_stages:
      - match:
          selector: '{job="system"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\w+\s+\d+\s+\d{2}:\d{2}:\d{2})\s+(?P<hostname>\S+)\s+(?P<application>\w+)(\[\d+\])?:\s+(?P<message>.*)$'
            - labels:
                hostname:
                application:
            - timestamp:
                source: timestamp
                format: 'Jan 02 15:04:05'

  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
    pipeline_stages:
      - cri: {}
      - labels:
          stream:
