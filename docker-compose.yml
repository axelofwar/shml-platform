services:
  traefik:
    image: traefik:v2.11
    container_name: ml-platform-traefik
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.49'
          memory: 385M
        reservations:
          cpus: '0.25'
          memory: 128M
    command:
    - --api.insecure=true
    - --api.dashboard=true
    - --providers.docker=true
    - --providers.docker.exposedbydefault=false
    - --providers.docker.network=ml-platform
    - --entrypoints.web.address=:80
    - --entrypoints.websecure.address=:443
    - --log.level=INFO
    - --accesslog=true
    - --metrics.prometheus=true
    - --ping=true
    ports:
    - 0.0.0.0:80:80
    - 0.0.0.0:443:443
    - 0.0.0.0:8090:8080
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
    - ml-platform
    healthcheck:
      test:
      - CMD
      - traefik
      - healthcheck
      - --ping
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
    - traefik.enable=true
    - traefik.http.routers.traefik.rule=PathPrefix(`/traefik`)
    - traefik.http.services.traefik.loadbalancer.server.port=8080
  redis:
    image: redis:7-alpine
    container_name: ml-platform-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.34'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    command: redis-server --maxmemory 400mb --maxmemory-policy allkeys-lru --appendonly
      yes --save 60 1000
    volumes:
    - redis-data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
    - ml-platform
    expose:
    - '6379'
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ml-platform-node-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.42'
          memory: 109M
        reservations:
          cpus: '0.05'
          memory: 32M
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --path.rootfs=/rootfs
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    networks:
    - ml-platform
    expose:
    - '9100'
    pid: host
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ml-platform-cadvisor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.47'
          memory: 141M
        reservations:
          cpus: '0.1'
          memory: 64M
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    networks:
    - ml-platform
    expose:
    - '8080'
    privileged: true
    devices:
    - /dev/kmsg

  # ==========================================================================
  # SHARED POSTGRESQL (Consolidated: MLflow + Ray + Inference)
  # Authentik keeps separate instance for security isolation
  # ==========================================================================
  shared-postgres:
    image: postgres:15-alpine
    container_name: shared-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 384M
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/shared_db_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
    - shared-postgres-data:/var/lib/postgresql/data
    - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    - ./backups/postgres:/backups
    secrets:
    - shared_db_password
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - ml-platform
    expose:
    - '5432'

  mlflow-server:
    build:
      context: ./mlflow-server/docker/mlflow
      dockerfile: Dockerfile
    container_name: mlflow-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 717M
        reservations:
          cpus: '0.5'
          memory: 512M
    expose:
    - '5000'
    depends_on:
      shared-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:$${DB_PASSWORD}@shared-postgres:5432/mlflow_db
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
      MLFLOW_ARTIFACTS_DESTINATION: /mlflow/artifacts
      MLFLOW_HOST: 0.0.0.0
      MLFLOW_PORT: 5000
      MLFLOW_WORKERS: 8
      MLFLOW_WORKER_CONNECTIONS: 2000
      MLFLOW_WORKER_TIMEOUT: 3600
      MLFLOW_SCHEMA_VALIDATION: 'true'
      MLFLOW_REQUIRE_METADATA: 'true'
      MLFLOW_AUTO_COMPRESS: 'true'
      MLFLOW_COMPRESSION_THRESHOLD_MB: 10
      MLFLOW_COMPRESSION_FORMAT: zstd
      MLFLOW_ALLOW_REFERENCE_PATHS: 'true'
      MLFLOW_SCAN_SENSITIVE_DATA: 'true'
      REDIS_HOST: ml-platform-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
    - /mlflow/artifacts:/mlflow/artifacts
    - mlflow-mlruns:/mlflow/mlruns
    - ./mlflow-server/docker/mlflow/plugins:/mlflow/plugins
    - ./mlflow-server/config/schema:/mlflow/schema
    - ./mlflow-server/scripts:/mlflow/scripts:ro
    - ./mlflow-server/logs/mlflow:/mlflow/logs
    secrets:
    - shared_db_password
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:5000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
    - ml-platform
  mlflow-nginx:
    image: nginx:alpine
    container_name: mlflow-nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.72'
          memory: 192M
        reservations:
          cpus: '0.1'
          memory: 64M
    depends_on:
      mlflow-server:
        condition: service_healthy
    expose:
    - '80'
    volumes:
    - ./mlflow-server/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    - ./mlflow-server/docker/nginx/conf.d:/etc/nginx/conf.d:ro
    - ./mlflow-server/docker/nginx/ssl:/etc/nginx/ssl:ro
    - ./mlflow-server/logs/nginx:/var/log/nginx
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
    - ml-platform
    labels:
    - traefik.enable=true
    - traefik.http.services.mlflow.loadbalancer.server.port=80
    - traefik.http.middlewares.mlflow-stripprefix.stripprefix.prefixes=/mlflow
    - traefik.http.middlewares.mlflow-stripprefix.stripprefix.forceslash=false
    - traefik.http.middlewares.mlflow-ajax-strip.stripprefix.prefixes=/ajax
    - traefik.http.routers.mlflow-api.rule=PathPrefix(`/api/2.0/mlflow`)
    - traefik.http.routers.mlflow-api.entrypoints=web
    - traefik.http.routers.mlflow-api.service=mlflow
    - traefik.http.routers.mlflow-api.priority=400
    - traefik.http.routers.mlflow-ajax.rule=PathPrefix(`/ajax-api/2.0/mlflow`)
    - traefik.http.routers.mlflow-ajax.entrypoints=web
    - traefik.http.routers.mlflow-ajax.service=mlflow
    - traefik.http.routers.mlflow-ajax.middlewares=mlflow-ajax-strip
    - traefik.http.routers.mlflow-ajax.priority=350
    - traefik.http.routers.mlflow-ui.rule=PathPrefix(`/mlflow`)
    - traefik.http.routers.mlflow-ui.entrypoints=web
    - traefik.http.routers.mlflow-ui.service=mlflow
    - traefik.http.routers.mlflow-ui.middlewares=mlflow-stripprefix
    - traefik.http.routers.mlflow-ui.priority=10
  mlflow-api:
    build:
      context: ./mlflow-server/api
      dockerfile: Dockerfile
    container_name: mlflow-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.87'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      mlflow-server:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
      OAUTH_ENABLED: ${OAUTH_ENABLED:-false}
      AUTHENTIK_URL: ${AUTHENTIK_INTERNAL_URL:-http://authentik-server:9000}
      MLFLOW_OAUTH_CLIENT_ID: ${MLFLOW_OAUTH_CLIENT_ID}
      MLFLOW_OAUTH_CLIENT_SECRET: ${MLFLOW_OAUTH_CLIENT_SECRET}
    volumes:
    - /mlflow/artifacts:/mlflow/artifacts
    - ./mlflow-server/config/schema:/mlflow/config/schema:ro
    - ./mlflow-server/api:/app:ro
    expose:
    - '8000'
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
    - ml-platform
    labels:
    - traefik.enable=true
    - traefik.http.services.mlflow-api-service.loadbalancer.server.port=8000
    - traefik.http.routers.mlflow-api-v1.rule=PathPrefix(`/api/v1`)
    - traefik.http.routers.mlflow-api-v1.entrypoints=web
    - traefik.http.routers.mlflow-api-v1.service=mlflow-api-service
    - traefik.http.routers.mlflow-api-v1.priority=2147483647
    - traefik.http.routers.mlflow-api-docs.rule=PathPrefix(`/api/v1/docs`) || PathPrefix(`/api/v1/redoc`)
      || PathPrefix(`/api/v1/openapi.json`)
    - traefik.http.routers.mlflow-api-docs.entrypoints=web
    - traefik.http.routers.mlflow-api-docs.service=mlflow-api-service
    - traefik.http.routers.mlflow-api-docs.priority=450

  # ==========================================================================
  # UNIFIED MONITORING (Consolidated Prometheus + Grafana)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ml-platform-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=90d
    - --web.console.libraries=/usr/share/prometheus/console_libraries
    - --web.console.templates=/usr/share/prometheus/consoles
    - --web.enable-lifecycle
    - --web.enable-admin-api
    volumes:
    - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
    - prometheus-data:/prometheus
    expose:
    - '9090'
    networks:
    - ml-platform
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:9090/-/healthy
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
    - traefik.enable=true
    - traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)
    - traefik.http.routers.prometheus.entrypoints=web
    - traefik.http.services.prometheus.loadbalancer.server.port=9090
    - traefik.http.middlewares.prometheus-strip.stripprefix.prefixes=/prometheus
    - traefik.http.routers.prometheus.middlewares=prometheus-strip
    - traefik.http.routers.prometheus.priority=100

  grafana:
    image: grafana/grafana:10.2.2
    container_name: ml-platform-grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 192M
    depends_on:
    - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_password
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: http://localhost/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_SECURITY_DISABLE_GRAVATAR: 'true'
    volumes:
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./monitoring/grafana/dashboards/mlflow:/var/lib/grafana/dashboards/mlflow:ro
    - ./monitoring/grafana/dashboards/ray:/var/lib/grafana/dashboards/ray:ro
    - ./monitoring/grafana/dashboards/system:/var/lib/grafana/dashboards/system:ro
    - ./monitoring/grafana/dashboards/inference:/var/lib/grafana/dashboards/inference:ro
    - grafana-data:/var/lib/grafana
    secrets:
    - grafana_password
    expose:
    - '3000'
    networks:
    - ml-platform
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:3000/api/health
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
    - traefik.enable=true
    - traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)
    - traefik.http.routers.grafana.entrypoints=web
    - traefik.http.services.grafana.loadbalancer.server.port=3000
    - traefik.http.routers.grafana.priority=100

  # ==========================================================================
  # DEPRECATED: Old separate monitoring (kept for reference, remove after migration)
  # ==========================================================================
  # mlflow-prometheus and mlflow-grafana have been consolidated into unified prometheus/grafana
  # ray-prometheus and ray-grafana have been consolidated into unified prometheus/grafana
  # Access unified monitoring at /prometheus and /grafana

  mlflow-adminer:
    build:
      context: ./mlflow-server/docker/adminer
      dockerfile: Dockerfile
    container_name: mlflow-adminer
    restart: unless-stopped
    profiles:
      - dev
    deploy:
      resources:
        limits:
          cpus: '0.42'
          memory: 141M
        reservations:
          cpus: '0.05'
          memory: 64M
    depends_on:
    - shared-postgres
    expose:
    - '8080'
    environment:
      ADMINER_DEFAULT_SERVER: shared-postgres
    networks:
    - ml-platform
    labels:
    - traefik.enable=true
    - traefik.http.routers.mlflow-adminer.rule=PathPrefix(`/mlflow-adminer`)
    - traefik.http.routers.mlflow-adminer.entrypoints=web
    - traefik.http.services.mlflow-adminer.loadbalancer.server.port=8080
  mlflow-backup:
    build:
      context: ./mlflow-server/docker/backup
      dockerfile: Dockerfile
    container_name: mlflow-backup
    restart: 'no'
    profiles:
    - backup
    deploy:
      resources:
        limits:
          cpus: '0.47'
          memory: 205M
        reservations:
          cpus: '0.1'
          memory: 128M
    depends_on:
    - shared-postgres
    environment:
      BACKUP_SCHEDULE: 0 2 * * *
      BACKUP_RETENTION_DAYS: 90
      BACKUP_RETENTION_PRODUCTION: 0
      POSTGRES_HOST: shared-postgres
      POSTGRES_DB: mlflow_db
      POSTGRES_USER: mlflow
    volumes:
    - ./backups:/backups
    - mlflow-artifacts:/mlflow/artifacts:ro
    secrets:
    - shared_db_password
    networks:
    - ml-platform

  # ray-postgres removed - consolidated into shared-postgres
    expose:
    - '5432'
  ray-head:
    build:
      context: ./ray_compute/docker
      dockerfile: Dockerfile.ray-head
    image: ml-platform-ray-head:2.9.0-gpu-mlflow
    container_name: ray-head
    restart: unless-stopped
    shm_size: 2gb
    command: 'ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265
      --metrics-export-port=8080 --num-cpus=8 --num-gpus=2 --object-store-memory=536870912 --block

      '
    environment:
    - RAY_memory_monitor_refresh_ms=0
    - CUDA_VISIBLE_DEVICES=0,1
    - NVIDIA_VISIBLE_DEVICES=0,1
    - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
    - CUDA_MPS_LOG_DIRECTORY=/tmp/nvidia-log
    - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    - MLFLOW_S3_ENDPOINT_URL=
    volumes:
    - ./ray_compute/data/ray:/tmp/ray
    - ./ray_compute/data/job_workspaces:/opt/ray/job_workspaces
    - nvidia-mps:/tmp/nvidia-mps
    networks:
    - ml-platform
    expose:
    - '6379'
    - '8265'
    - '8080'
    - '10001'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 2G
          devices:
          - driver: nvidia
            device_ids: ['0', '1']
            capabilities:
            - gpu
    healthcheck:
      test:
      - CMD
      - ray
      - status
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
    - traefik.enable=true
    - traefik.http.routers.ray-dashboard.rule=PathPrefix(`/ray`)
    - traefik.http.routers.ray-dashboard.entrypoints=web
    - traefik.http.services.ray-dashboard.loadbalancer.server.port=8265
    - traefik.http.middlewares.ray-stripprefix.stripprefix.prefixes=/ray
    - traefik.http.routers.ray-dashboard.middlewares=ray-stripprefix
    - traefik.http.routers.ray-dashboard.priority=100
  ray-compute-api:
    build:
      context: ./ray_compute
      dockerfile: Dockerfile.api
    container_name: ray-compute-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.87'
          memory: 640M
        reservations:
          cpus: '0.25'
          memory: 512M
    environment:
    - POSTGRES_HOST=shared-postgres
    - POSTGRES_PORT=5432
    - POSTGRES_DB=ray_compute
    - POSTGRES_USER=ray_compute
    - POSTGRES_PASSWORD_FILE=/run/secrets/shared_db_password
    - REDIS_HOST=ml-platform-redis
    - REDIS_PORT=6379
    - REDIS_DB=1
    - RAY_ADDRESS=http://ray-head:8265
    - MLFLOW_TRACKING_URI=http://mlflow-nginx:80
    - API_HOST=0.0.0.0
    - API_PORT=8000
    - API_SECRET_KEY=${RAY_API_SECRET_KEY:-change-me-in-production}
    - CORS_ORIGINS=${CORS_ORIGINS:-*}
    - JOB_WORKSPACE=/opt/ray/job_workspaces
    - ARTIFACT_RETENTION_HOURS=24
    - OAUTH_ENABLED=${OAUTH_ENABLED:-false}
    - AUTHENTIK_URL=${AUTHENTIK_INTERNAL_URL:-http://authentik-server:9000}
    - AUTHENTIK_CLIENT_ID=${RAY_OAUTH_CLIENT_ID}
    - AUTHENTIK_CLIENT_SECRET=${RAY_OAUTH_CLIENT_SECRET}
    - API_KEY_ENABLED=false
    - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
    - DEBUG=false
    - LOG_LEVEL=INFO
    volumes:
    - ./ray_compute/logs:/app/logs
    - ./ray_compute/data/artifacts:/app/artifacts
    - ./ray_compute/data/job_workspaces:/opt/ray/job_workspaces
    - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
    - shared_db_password
    expose:
    - '8000'
    networks:
    - ml-platform
    depends_on:
      shared-postgres:
        condition: service_healthy
      ray-head:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
    - traefik.enable=true
    - traefik.http.routers.ray-api.rule=PathPrefix(`/api/ray`) || PathPrefix(`/api/compute`)
    - traefik.http.routers.ray-api.entrypoints=web
    - traefik.http.services.ray-api.loadbalancer.server.port=8000
    - traefik.http.middlewares.ray-api-strip.stripprefix.prefixes=/api/ray,/api/compute
    - traefik.http.routers.ray-api.middlewares=ray-api-strip
    - traefik.http.routers.ray-api.priority=300

  # ray-prometheus and ray-grafana consolidated into unified prometheus/grafana above

  authentik-db:
    image: postgres:15-alpine
    container_name: authentik-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.72'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD:?AUTHENTIK_DB_PASSWORD must be set}
    volumes:
    - authentik-db:/var/lib/postgresql/data
    networks:
    - ml-platform
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U authentik
      interval: 10s
      timeout: 5s
      retries: 5
  authentik-redis:
    image: redis:7-alpine
    container_name: authentik-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.67'
          memory: 192M
        reservations:
          cpus: '0.05'
          memory: 64M
    command: --save 60 1 --loglevel warning
    volumes:
    - authentik-redis:/data
    networks:
    - ml-platform
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli ping | grep PONG
      interval: 10s
      timeout: 3s
      retries: 5
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.8
    container_name: authentik-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.87'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY must be set}
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:?AUTHENTIK_DB_PASSWORD must be set}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: 'false'
      AUTHENTIK_DISABLE_UPDATE_CHECK: 'true'
      AUTHENTIK_AVATARS: gravatar,initials
    volumes:
    - authentik-media:/media
    - authentik-custom-templates:/templates
    networks:
    - ml-platform
    ports:
    - 9000:9000
    - 9443:9443
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - ak healthcheck || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.8
    container_name: authentik-worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.47'
          memory: 205M
        reservations:
          cpus: '0.1'
          memory: 128M
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY must be set}
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:?AUTHENTIK_DB_PASSWORD must be set}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: 'false'
      AUTHENTIK_DISABLE_UPDATE_CHECK: 'true'
    volumes:
    - authentik-media:/media
    - authentik-certs:/certs
    - authentik-custom-templates:/templates
    networks:
    - ml-platform
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

secrets:
  # Shared PostgreSQL password (used by mlflow, ray, inference)
  shared_db_password:
    file: ./secrets/shared_db_password.txt
  # Grafana admin password
  grafana_password:
    file: ./monitoring/secrets/grafana_password.txt

volumes:
  # Shared services
  redis-data:
    name: ml-platform-redis-data
  shared-postgres-data:
    name: shared-postgres-data
  
  # MLflow
  mlflow-artifacts:
    name: mlflow-artifacts
  mlflow-mlruns:
    name: mlflow-mlruns
  
  # Monitoring
  prometheus-data:
    name: unified-prometheus-data
  grafana-data:
    name: unified-grafana-data
  
  # Ray
  nvidia-mps:
    name: nvidia-mps
  
  # Authentik (separate for security)
  authentik-db:
    name: authentik-postgres-data
  authentik-redis:
    name: authentik-redis-data
  authentik-media:
    name: authentik-media
  authentik-certs:
    name: authentik-certs
  authentik-custom-templates:
    name: authentik-custom-templates

networks:
  ml-platform:
    name: ml-platform
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.0.0/16
