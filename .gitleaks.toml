# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks

title = "Gitleaks Configuration for SFML Platform"

[extend]
# Use default rules as a base
useDefault = true

# Paths to exclude from scanning
[allowlist]
description = "Allowlisted paths and patterns"

# Ignore archived documentation (secrets have been rotated)
paths = [
    '''archived/.*''',
    '''__MACOSX/''',
    '''backups/''',
    '''tests/''',
    '''\.github/copilot-instructions\.md$''',
    '''docs/internal/archived_approaches/.*''',
    '''fusionauth/lambdas/.*''',
    # Third-party submodule — has its own scanning
    '''libs/hermes-self-evolution/.*''',
    # MkDocs generated site and public mirror staging area
    '''site/.*''',
    '''\.public-mirror/.*''',
    # Deleted docs that existed only in early git history.
    # UI_VERIFICATION_AND_FIXES.md had an example password (noted "after reset").
    # API_REFERENCE.md had a curl example X-API-Key header.
    # Both files were removed in the security cleanup commit; patterns were
    # documentation examples, not real credentials.
    '''UI_VERIFICATION_AND_FIXES\.md''',
    '''API_REFERENCE\.md''',
]

# Ignore specific patterns that are false positives
regexes = [
    # Example/placeholder patterns in documentation
    '''your[._-]?password''',
    '''change[._-]?me[._-]?in[._-]?production''',
    '''placeholder''',
    '''<[A-Z_]+>''',
    '''\$\{[A-Z_]+\}''',
    '''sk-1234567890''',
    # REDACTED placeholders in documentation
    '''REDACTED''',
    # Example API keys in documentation
    '''shml_key_[a-zA-Z0-9]+\.\.\.''',
    # Placeholder API keys with underscores
    '''YOUR_API_KEY''',
    '''YOUR_[A-Z_]+''',
    # Documentation "bad example" client_secret placeholder used in security rules docs
    '''JsDs6mClPCWKqEq''',
    # UUID placeholders (app IDs, not secrets)
    '''acda34f0-7cf2-40eb-9cba-7cb0048857d3''',
    '''50a4dc27-578a-47f1-a98e-1b9f47e2e81b''',
]

# Allowlist specific fingerprints (file:rule:line) — false positives
fingerprints = [
    # README.md:50 — sidekiq-secret rule fires on the GA runner working tree.
    # Confirmed: no BUNDLE_ENTERPRISE__CONTRIBSYS__COM pattern exists in any
    # tracked file. Likely a false positive from an untracked file generated
    # during checkout on the runner (e.g. pip cache or submodule artifact).
    "README.md:sidekiq-secret:50",
    # Commit b2477a07 — UI_VERIFICATION_AND_FIXES.md line 198:
    # Example password in documentation (noted "after reset"). File later deleted.
    "b2477a07135ffc012971220c10cdc9fc33d7ce9a:UI_VERIFICATION_AND_FIXES.md:generic-api-key:198",
    # Commit 2e6d7a88 — API_REFERENCE.md line 714:
    # Example X-API-Key header in curl documentation example. File later deleted.
    "2e6d7a8842bf1c742d02e57caac886e3eb840752:API_REFERENCE.md:curl-auth-header:714",
    # Commit f92dff46 — security rules docs contain "bad example" placeholder patterns:
    # - ❌ PASSWORD=gNz8AP... (high-entropy base64, shown as what NOT to commit)
    # - ❌ client_secret=JsDs6m... (shown as what NOT to commit)
    # These are documentation examples. The base value was replaced with a plaintext
    # password in subsequent commits; these fingerprints suppress the historical scan.
    "f92dff462a1d549ba6f276598fdacc72dff8a3b0:.github/instructions/security.instructions.md:generic-api-key:87",
    "f92dff462a1d549ba6f276598fdacc72dff8a3b0:.agent/rules/security.md:generic-api-key:85",
    "f92dff462a1d549ba6f276598fdacc72dff8a3b0:.agent/rules/security.md:generic-api-key:88",
    "f92dff462a1d549ba6f276598fdacc72dff8a3b0:.claude/CLAUDE.md:generic-api-key:242",
    "f92dff462a1d549ba6f276598fdacc72dff8a3b0:.claude/CLAUDE.md:generic-api-key:245",
]

# Allowlist specific commits/findings (false positives in git history)
commits = [
    # UI_VERIFICATION_AND_FIXES.md: redacted password in docs (password was reset)
    '''2a77ee51708ae1414a972eb1cfee1f65fe6a00db''',
]
