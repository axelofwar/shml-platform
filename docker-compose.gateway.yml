# Traefik API Gateway - Unified Entry Point
# Provides single URL for all ML Platform services
# Access: http://localhost (or http://YOUR_IP)

services:
  # Traefik - Cloud Native API Gateway
  traefik:
    image: traefik:v2.10
    container_name: ml-platform-gateway
    restart: unless-stopped
    
    command:
      # API and dashboard
      - "--api.insecure=true"
      - "--api.dashboard=true"
      
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.network=ml-platform"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.allowEmptyServices=true"
      
      # Entry points
      - "--entrypoints.web.address=:80"
      - "--entrypoints.traefik.address=:8080"
      
      # Access logs
      - "--accesslog=true"
      - "--accesslog.filepath=/var/lo./traefik/access.log"
      
      # Logging
      - "--log.level=DEBUG"
      - "--log.filepath=/var/lo./traefik/traefik.log"
      
      # Metrics (Prometheus)
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.buckets=0.1,0.3,1.0,2.5,5.0"
    
    ports:
      - "80:80"       # HTTP entry point
      - "8090:8080"   # Traefik dashboard
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/traefik:/var/log/traefik
    
    networks:
      - ml-platform
    
    labels:
      # Enable Traefik for itself (dashboard)
      - "traefik.enable=true"
      
      # Dashboard route
      - "traefik.http.routers.traefik.rule=PathPrefix(`/traefik`) || PathPrefix(`/api`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"
      
      # Strip /traefik prefix
      - "traefik.http.middlewares.traefik-stripprefix.stripprefix.prefixes=/traefik"
      - "traefik.http.routers.traefik.middlewares=traefik-stripprefix"
    
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  ml-platform:
    name: ml-platform
    external: true

volumes:
  traefik-logs:
    name: traefik-logs
