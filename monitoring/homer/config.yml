# SFML Platform - Homer Dashboard
# https://github.com/bastienwirtz/homer

title: "SFML Platform"
subtitle: "ML Infrastructure Dashboard"
logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/machine-learning.png"

header: true
footer: false

# Theme customization
theme: default
colors:
  light:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#f5f5f5"
    card-background: "#ffffff"
    text: "#363636"
    text-header: "#ffffff"
    text-title: "#303030"
    text-subtitle: "#424242"
    card-shadow: rgba(0, 0, 0, 0.1)
    link: "#3273dc"
    link-hover: "#363636"
  dark:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#131313"
    card-background: "#2b2b2b"
    text: "#eaeaea"
    text-header: "#ffffff"
    text-title: "#fafafa"
    text-subtitle: "#f5f5f5"
    card-shadow: rgba(0, 0, 0, 0.4)
    link: "#3273dc"
    link-hover: "#ffdd57"

# Links section (quick access)
links:
  - name: "GitHub Repo"
    icon: "fab fa-github"
    url: "https://github.com/axelofwar/sfml-platform"
    target: "_blank"

# Services - Main dashboard content
# Using RELATIVE URLs so they work from any access point (LAN, Tailscale, Funnel)
services:
  - name: "ML Platform"
    icon: "fas fa-brain"
    items:
      - name: "MLflow"
        subtitle: "Experiment Tracking & Model Registry"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/mlflow.png"
        url: "/mlflow/"
        target: "_blank"
      - name: "Ray Dashboard"
        subtitle: "Distributed GPU Compute"
        logo: "https://avatars.githubusercontent.com/u/22125274?s=200&v=4"
        url: "/ray/"
        target: "_blank"

  - name: "Monitoring"
    icon: "fas fa-chart-line"
    items:
      - name: "Grafana"
        subtitle: "Metrics & Dashboards"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/grafana.png"
        url: "/grafana/"
        target: "_blank"
      - name: "Prometheus"
        subtitle: "Metrics Collection"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/prometheus.png"
        url: "/prometheus/"
        target: "_blank"
      - name: "Dozzle"
        subtitle: "Real-time Container Logs"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/dozzle.png"
        url: "/logs/"
        target: "_blank"

  - name: "Infrastructure"
    icon: "fas fa-server"
    items:
      - name: "Traefik"
        subtitle: "API Gateway & Routing"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/traefik.png"
        url: "/traefik/"
        target: "_blank"
      - name: "FusionAuth"
        subtitle: "Identity & Access Management"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/fusionauth.png"
        url: "/auth/"
        target: "_blank"

  # Admin section uses direct LAN IP for ports not exposed through Traefik
  # NOTE: Update IP (10.0.0.163) to match your server's LAN address
  # These links only work from the local network
  - name: "Admin (Direct Ports - LAN Only)"
    icon: "fas fa-cog"
    items:
      - name: "Traefik API"
        subtitle: "Direct API Dashboard (port 8090)"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/traefik.png"
        url: "http://10.0.0.163:8090/dashboard/"
        target: "_blank"
      - name: "FusionAuth Admin"
        subtitle: "Direct Admin UI (port 9011)"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/fusionauth.png"
        url: "http://10.0.0.163:9011/admin/"
        target: "_blank"
