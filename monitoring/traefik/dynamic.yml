{{- $wsBase := env "HERMES_WORKSPACE_BASE" | default "/hermes-workspace" -}}
{{- $wsPort := env "HERMES_WORKSPACE_PORT" | default "3000" -}}
# Traefik Dynamic Configuration
# TLS certificates from Tailscale
#
# DEPLOYMENT NOTE: This file uses deployment-specific certificate paths.
# When deploying to a different Tailscale domain:
#
# 1. Generate Tailscale certificates:
#    tailscale cert <your-domain>
#
# 2. Move certs to secrets directory:
#    mv <your-domain>.crt ./secrets/
#    mv <your-domain>.key ./secrets/
#
# 3. Update the paths below (and in deploy/compose/docker-compose.infra.yml volumes)
#    Replace: <your-hostname>.<tailnet-id>.ts.net
#    With:    <your-domain>
#
# For automated deployment, consider using envsubst to template this file.

# --- Custom Headers Middleware ---
# Tailscale Serve/Funnel terminates TLS and proxies to Traefik's HTTP
# entrypoint (port 80). This means Traefik sees all external traffic
# as HTTP and sets X-Forwarded-Proto: http. Services behind Traefik
# (GitLab, etc.) then generate http:// URLs and fail CSRF/Secure cookie
# checks. This middleware overrides the proto header so backends know
# the original connection was HTTPS.
http:
  # ==========================================================================
  # REGISTRY AUTH BYPASS
  # GitLab JWT auth endpoint must be unprotected so `docker login/push/pull`
  # can authenticate against the container registry without oauth2-proxy
  # intercepting the token exchange.
  # Priority 250 > gitlab router priority 100 = matches first, no middleware.
  # ==========================================================================
  routers:
    gitlab-registry-jwt:
      rule: "PathPrefix(`/gitlab/jwt/auth`)"
      service: "gitlab@docker"
      priority: 250
      entryPoints:
        - web
        - websecure

    # GitNexus Code Intelligence — host-level systemd service on port 3005
    # Sigma.js WebGL graph visualization + REST API
    gitnexus:
      rule: "PathPrefix(`/gitnexus`)"
      service: "gitnexus@file"
      priority: 100
      entryPoints:
        - web
        - websecure
      middlewares:
        - oauth2-errors@docker
        - oauth2-auth@docker
        - gitnexus-stripprefix

    # Hermes Gateway — host-level process on port 8642
    # OpenAI-compatible API + cron jobs + session management
    # Role-gated: developer+ required (same as agent-service /cli route)
    hermes-gateway:
      rule: "PathPrefix(`/api/hermes`)"
      service: "hermes-gateway@file"
      priority: 2147483647
      entryPoints:
        - web
        - websecure
      middlewares:
        - oauth2-errors@docker
        - oauth2-auth@docker
        - role-auth-developer@docker
        - hermes-gateway-stripprefix

    # Hermes Gateway — OpenAI-compatible /v1 endpoint (for hermes-workspace)
    hermes-gateway-v1:
      rule: "PathPrefix(`/hermes/v1`)"
      service: "hermes-gateway@file"
      priority: 2147483646
      entryPoints:
        - web
        - websecure
      middlewares:
        - oauth2-errors@docker
        - oauth2-auth@docker
        - role-auth-developer@docker
        - hermes-v1-stripprefix

    # Hermes Gateway — health check (no auth required)
    hermes-gateway-health:
      rule: "Path(`/hermes/health`)"
      service: "hermes-gateway@file"
      priority: 2147483645
      entryPoints:
        - web
        - websecure
      middlewares:
        - hermes-health-rewrite

    # Hermes Workspace — Vite dev UI
    # Role-gated: admin only (agentic tool workspace)
    # No stripPrefix — Vite reads HERMES_WORKSPACE_BASE from .env (via vite.config.ts)
    hermes-workspace:
      rule: "PathPrefix(`{{ $wsBase }}`)"
      service: "hermes-workspace@file"
      priority: 2147483644
      entryPoints:
        - web
        - websecure
      middlewares:
        - oauth2-errors@docker
        - oauth2-auth@docker
        - role-auth-admin@docker

    # Hermes Workspace API — no auth middleware.
    # These are server-side TanStack routes + Vite HMR. The HTML page is
    # already admin-gated above; AJAX calls from the loaded page don't need
    # re-authentication (oauth2-proxy session cookie isn't forwarded on fetch).
    hermes-workspace-api:
      rule: "PathPrefix(`{{ $wsBase }}/api`) || PathPrefix(`{{ $wsBase }}/_serverFn`) || PathPrefix(`{{ $wsBase }}/@vite`)"
      service: "hermes-workspace@file"
      priority: 2147483645
      entryPoints:
        - web
        - websecure

  services:
    gitnexus:
      loadBalancer:
        servers:
          - url: "http://172.30.0.1:3005"

    hermes-gateway:
      loadBalancer:
        servers:
          - url: "http://172.30.0.1:8642"

    hermes-workspace:
      loadBalancer:
        servers:
          - url: "http://172.30.0.1:{{ $wsPort }}"

  middlewares:
    gitnexus-stripprefix:
      stripPrefix:
        prefixes:
          - "/gitnexus"

    hermes-gateway-stripprefix:
      stripPrefix:
        prefixes:
          - "/api/hermes"

    hermes-v1-stripprefix:
      stripPrefix:
        prefixes:
          - "/hermes"

    hermes-health-rewrite:
      replacePath:
        path: "/health"

    tailscale-https-proto:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
          X-Forwarded-Ssl: "on"

    # NemoClaw / OpenShell specific headers
    # Injects sandbox routing context for OpenShell gateway
    nemoclaw-headers:
      headers:
        customRequestHeaders:
          X-Openshell-Platform: "shml"
          X-Openshell-Gateway-Version: "v1"
        # Pass through auth headers to sandbox factory
        customResponseHeaders:
          X-Sandbox-Policy: ""  # filled by OpenShell gateway on response

tls:
  certificates:
    - certFile: /etc/traefik/certs/public-domain.crt
      keyFile: /etc/traefik/certs/public-domain.key

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/public-domain.crt
        keyFile: /etc/traefik/certs/public-domain.key
