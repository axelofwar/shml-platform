# Traefik Dynamic Configuration
# TLS certificates from Tailscale
#
# DEPLOYMENT NOTE: This file uses deployment-specific certificate paths.
# When deploying to a different Tailscale domain:
#
# 1. Generate Tailscale certificates:
#    tailscale cert <your-domain>
#
# 2. Move certs to secrets directory:
#    mv <your-domain>.crt ./secrets/
#    mv <your-domain>.key ./secrets/
#
# 3. Update the paths below (and in deploy/compose/docker-compose.infra.yml volumes)
#    Replace: <your-hostname>.<tailnet-id>.ts.net
#    With:    <your-domain>
#
# For automated deployment, consider using envsubst to template this file.

# --- Custom Headers Middleware ---
# Tailscale Serve/Funnel terminates TLS and proxies to Traefik's HTTP
# entrypoint (port 80). This means Traefik sees all external traffic
# as HTTP and sets X-Forwarded-Proto: http. Services behind Traefik
# (GitLab, etc.) then generate http:// URLs and fail CSRF/Secure cookie
# checks. This middleware overrides the proto header so backends know
# the original connection was HTTPS.
http:
  # ==========================================================================
  # REGISTRY AUTH BYPASS
  # GitLab JWT auth endpoint must be unprotected so `docker login/push/pull`
  # can authenticate against the container registry without oauth2-proxy
  # intercepting the token exchange.
  # Priority 250 > gitlab router priority 100 = matches first, no middleware.
  # ==========================================================================
  routers:
    gitlab-registry-jwt:
      rule: "PathPrefix(`/gitlab/jwt/auth`)"
      service: "gitlab@docker"
      priority: 250
      entryPoints:
        - web
        - websecure

  middlewares:
    tailscale-https-proto:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
          X-Forwarded-Ssl: "on"

    # NemoClaw / OpenShell specific headers
    # Injects sandbox routing context for OpenShell gateway
    nemoclaw-headers:
      headers:
        customRequestHeaders:
          X-Openshell-Platform: "shml"
          X-Openshell-Gateway-Version: "v1"
        # Pass through auth headers to sandbox factory
        customResponseHeaders:
          X-Sandbox-Policy: ""  # filled by OpenShell gateway on response

tls:
  certificates:
    - certFile: /etc/traefik/certs/public-domain.crt
      keyFile: /etc/traefik/certs/public-domain.key

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/public-domain.crt
        keyFile: /etc/traefik/certs/public-domain.key
