# Traefik Dynamic Configuration
# TLS certificates from Tailscale
#
# NOTE: Certificate filenames are deployment-specific. If using a different
# Tailscale domain, update the cert paths below or regenerate using:
#   tailscale cert <your-domain>
#   mv <your-domain>.crt ./secrets/
#   mv <your-domain>.key ./secrets/
# Then update these paths to match.

tls:
  certificates:
    - certFile: /etc/traefik/certs/sfml-platform.tail38b60a.ts.net.crt
      keyFile: /etc/traefik/certs/sfml-platform.tail38b60a.ts.net.key

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/sfml-platform.tail38b60a.ts.net.crt
        keyFile: /etc/traefik/certs/sfml-platform.tail38b60a.ts.net.key
