# Traefik Dynamic Configuration
# TLS certificates from Tailscale
#
# DEPLOYMENT NOTE: This file uses deployment-specific certificate paths.
# When deploying to a different Tailscale domain:
#
# 1. Generate Tailscale certificates:
#    tailscale cert <your-domain>
#
# 2. Move certs to secrets directory:
#    mv <your-domain>.crt ./secrets/
#    mv <your-domain>.key ./secrets/
#
# 3. Update the paths below (and in docker-compose.infra.yml volumes)
#    Replace: shml-platform.tail38b60a.ts.net
#    With:    <your-domain>
#
# For automated deployment, consider using envsubst to template this file.

tls:
  certificates:
    - certFile: /etc/traefik/certs/shml-platform.tail38b60a.ts.net.crt
      keyFile: /etc/traefik/certs/shml-platform.tail38b60a.ts.net.key

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/shml-platform.tail38b60a.ts.net.crt
        keyFile: /etc/traefik/certs/shml-platform.tail38b60a.ts.net.key
