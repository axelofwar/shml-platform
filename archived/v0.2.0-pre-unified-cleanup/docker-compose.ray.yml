services:
  # Ray Head Node with GPU support
  ray-head:
    image: rayproject/ray:2.9.0-gpu
    container_name: ray-head
    restart: unless-stopped
    shm_size: '2gb'
    command: >
      ray start --head
      --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --num-cpus=8
      --num-gpus=1
      --block
    environment:
      - RAY_memory_monitor_refresh_ms=0
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "6379:6379"     # Ray client
      - "8265:8265"     # Ray dashboard
      - "10001:10001"   # Ray serve
    volumes:
      - ./data/ray:/tmp/ray
      - ./data/job_workspaces:/opt/ray/job_workspaces
    networks:
      - ray-compute
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ray Job Submission Server (remote API)
  ray-job-server:
    build:
      context: .
      dockerfile: Dockerfile.ray-server
    container_name: ray-job-server
    restart: unless-stopped
    environment:
      - RAY_ADDRESS=http://ray-head:8265
      - MLFLOW_TRACKING_URI=http://mlflow-nginx:80
      - JOB_WORKSPACE=/opt/ray/job_workspaces
      - ARTIFACT_RETENTION_HOURS=24
      - API_KEY_ENABLED=true
      - API_SECRET_KEY=${API_SECRET_KEY}
    ports:
      - "8266:8266"     # Job submission API
    volumes:
      - ./data/job_workspaces:/opt/ray/job_workspaces
      - ./logs:/app/logs
    networks:
      - ray-compute
    depends_on:
      ray-head:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8266/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  ray-compute:
    name: ray-compute
    external: true
