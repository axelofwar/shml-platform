services:
  # PostgreSQL Database for Ray Compute
  ray-compute-db:
    image: postgres:15-alpine
    container_name: ray-compute-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ray_compute
      POSTGRES_USER: ray_compute
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ray-compute-db-data:/var/lib/postgresql/data
    networks:
      - ray-compute
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ray_compute"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ray Compute API Server
  ray-compute-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ray-compute-api
    restart: unless-stopped
    environment:
      # Database
      - POSTGRES_HOST=ray-compute-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ray_compute
      - POSTGRES_USER=ray_compute
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      # Authentik OAuth
      - AUTHENTIK_URL=http://authentik-server:9000
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}

      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_SECRET_KEY=${API_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}

      # Redis
      - REDIS_HOST=ray-redis
      - REDIS_PORT=6379

      # Ray
      - RAY_ADDRESS=${RAY_ADDRESS}

      # Monitoring
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus

      # Development
      - DEBUG=false
      - LOG_LEVEL=INFO

    volumes:
      - ./logs:/app/logs
      - ./data/artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For Docker job execution

    ports:
      - "8000:8000"
      - "8266:8266"  # Alternative port

    networks:
      - ray-compute

    depends_on:
      ray-compute-db:
        condition: service_healthy
      ray-redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for job queue (reuse if already running)
  ray-redis:
    image: redis:7-alpine
    container_name: ray-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ray-compute
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  ray-compute:
    name: ray-compute
    external: true

volumes:
  redis-data:
    name: ray-redis-data
  ray-compute-db-data:
    name: ray-compute-db-data
