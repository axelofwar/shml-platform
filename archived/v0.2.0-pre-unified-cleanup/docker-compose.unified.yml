# Ray Compute Platform - Integrated with ML Platform
# Unified docker-compose for all Ray services
# Access: http://localhost/ray (via Traefik)

services:
  # PostgreSQL Database for Ray Compute
  ray-compute-db:
    image: postgres:15-alpine
    container_name: ray-compute-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ray_compute
      POSTGRES_USER: ray_compute
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ray-compute-db-data:/var/lib/postgresql/data
    networks:
      - ml-platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ray_compute"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  # Ray Head Node with GPU support
  ray-head:
    image: rayproject/ray:2.9.0-gpu
    container_name: ray-head
    restart: unless-stopped
    shm_size: '4gb'  # Increased for GPU workloads
    command: >
      ray start --head
      --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --num-cpus=8
      --num-gpus=1
      --object-store-memory=8000000000
      --block
    environment:
      - RAY_memory_monitor_refresh_ms=0
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=0
      # Enable MPS for GPU sharing
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_LOG_DIRECTORY=/tmp/nvidia-log
    volumes:
      - ./data/ray:/tmp/ray
      - ./data/job_workspaces:/opt/ray/job_workspaces
      - nvidia-mps:/tmp/nvidia-mps
    networks:
      - ml-platform
    expose:
      - "6379"   # Ray client
      - "8265"   # Ray dashboard
      - "10001"  # Ray serve
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      # Ray Dashboard
      - "traefik.http.routers.ray-dashboard.rule=PathPrefix(`/ray`)"
      - "traefik.http.routers.ray-dashboard.entrypoints=web"
      - "traefik.http.services.ray-dashboard.loadbalancer.server.port=8265"
      - "traefik.http.middlewares.ray-stripprefix.stripprefix.prefixes=/ray"
      - "traefik.http.routers.ray-dashboard.middlewares=ray-stripprefix"

  # Ray Compute API Server
  ray-compute-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ray-compute-api
    restart: unless-stopped
    environment:
      # Database
      - POSTGRES_HOST=ray-compute-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ray_compute
      - POSTGRES_USER=ray_compute
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      # Redis (shared with MLflow, using DB 1)
      - REDIS_HOST=ml-platform-redis
      - REDIS_PORT=6379
      - REDIS_DB=1

      # Ray Cluster (use Docker service name)
      - RAY_ADDRESS=http://ray-head:8265

      # MLflow (use Docker service name)
      - MLFLOW_TRACKING_URI=http://mlflow-nginx:80

      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_SECRET_KEY=${API_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}

      # Job Configuration
      - JOB_WORKSPACE=/opt/ray/job_workspaces
      - ARTIFACT_RETENTION_HOURS=24

      # Auth (disabled for now)
      - API_KEY_ENABLED=false

      # Monitoring
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus

      # Logging
      - DEBUG=false
      - LOG_LEVEL=INFO

    volumes:
      - ./logs:/app/logs
      - ./data/artifacts:/app/artifacts
      - ./data/job_workspaces:/opt/ray/job_workspaces
      - /var/run/docker.sock:/var/run/docker.sock:ro

    expose:
      - "8000"

    networks:
      - ml-platform

    depends_on:
      ray-compute-db:
        condition: service_healthy
      ray-head:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "traefik.enable=true"
      # Ray Compute API
      - "traefik.http.routers.ray-api.rule=PathPrefix(`/api/ray`) || PathPrefix(`/api/compute`)"
      - "traefik.http.routers.ray-api.entrypoints=web"
      - "traefik.http.services.ray-api.loadbalancer.server.port=8000"
      # Strip /api/ray prefix
      - "traefik.http.middlewares.ray-api-stripprefix.stripprefix.prefixes=/api/ray,/api/compute"
      - "traefik.http.routers.ray-api.middlewares=ray-api-stripprefix"
      # Also expose docs at /ray/docs
      - "traefik.http.routers.ray-docs.rule=PathPrefix(`/ray-docs`)"
      - "traefik.http.routers.ray-docs.service=ray-api"
      - "traefik.http.middlewares.ray-docs-stripprefix.stripprefix.prefixes=/ray-docs"
      - "traefik.http.middlewares.ray-docs-replacepath.replacepath.path=/docs"
      - "traefik.http.routers.ray-docs.middlewares=ray-docs-stripprefix,ray-docs-replacepath"

  # Prometheus - Ray Metrics
  ray-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ray-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - ray-prometheus-data:/prometheus
    networks:
      - ml-platform
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Ray Monitoring
  ray-grafana:
    image: grafana/grafana:10.2.2
    container_name: ray-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://localhost/ray-grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ray-grafana-data:/var/lib/grafana
    networks:
      - ml-platform
    expose:
      - "3000"
    depends_on:
      - ray-prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ray-grafana.rule=PathPrefix(`/ray-grafana`)"
      - "traefik.http.routers.ray-grafana.entrypoints=web"
      - "traefik.http.services.ray-grafana.loadbalancer.server.port=3000"

networks:
  ml-platform:
    name: ml-platform
    external: true

volumes:
  ray-compute-db-data:
    name: ray-compute-db-data
  ray-prometheus-data:
    name: ray-prometheus-data
  ray-grafana-data:
    name: ray-grafana-data
  nvidia-mps:
    name: nvidia-mps
