[pytest]
testpaths = tests/platform_admin
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (requires FusionAuth)
    e2e: End-to-end tests (requires full platform)
    slow: Slow tests

# Default options
addopts = -v --tb=short --strict-markers

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Test ordering (run in order)
# Unit tests first, then integration, then e2e, then cleanup
