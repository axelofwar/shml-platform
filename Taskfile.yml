# Taskfile.yml — SHML Platform Developer Entrypoint
# https://taskfile.dev
#
# Usage:
#   task                   # Default: show status
#   task start             # Start all services
#   task start:inference   # Start inference stack only
#   task restart:ray       # Restart Ray stack
#   task stop              # Stop all services
#   task deploy            # Pull from registry then start all
#   task status            # Show health status
#   task build             # Rebuild all images
#   task logs -- <service> # Follow logs for a service
#
# Install task: https://taskfile.dev/installation/
#   brew install go-task  |  go install github.com/go-task/task/v3/cmd/task@latest

version: "3"

set: [pipefail]

vars:
  DEPLOY: ./scripts/deploy/start_all_safe.sh

# =============================================================================
# Default: show status
# =============================================================================
tasks:
  default:
    desc: Show platform status
    cmds:
      - "{{.DEPLOY}} status"
    silent: true

  # ===========================================================================
  # Start
  # ===========================================================================
  start:
    desc: Start all services (local/cached images)
    cmds:
      - "{{.DEPLOY}} start"

  "start:infra":
    desc: Start infrastructure (Traefik, Postgres, Redis, Nessie)
    cmds:
      - "{{.DEPLOY}} start infra"

  "start:auth":
    desc: Start auth stack (FusionAuth, OAuth2 Proxy, Role Auth)
    cmds:
      - "{{.DEPLOY}} start auth"

  "start:mlflow":
    desc: Start MLflow tracking server
    cmds:
      - "{{.DEPLOY}} start mlflow"

  "start:ray":
    desc: Start Ray compute cluster
    cmds:
      - "{{.DEPLOY}} start ray"

  "start:inference":
    desc: Start inference stack (coding models, chat API, embedding)
    cmds:
      - "{{.DEPLOY}} start inference"

  "start:monitoring":
    desc: Start monitoring stack (Prometheus, Grafana, Alertmanager)
    cmds:
      - "{{.DEPLOY}} start monitoring"

  "start:devtools":
    desc: Start devtools (VS Code Server, Homer, GitLab, FiftyOne)
    cmds:
      - "{{.DEPLOY}} start devtools"

  "start:agent":
    desc: Start ACE Agent service
    cmds:
      - "{{.DEPLOY}} start agent"

  "start:watchdog":
    desc: Start self-healing watchdog
    cmds:
      - "{{.DEPLOY}} start watchdog"

  "start:sba":
    desc: Start SBA resource portal
    cmds:
      - "{{.DEPLOY}} start sba"

  # ===========================================================================
  # Stop
  # ===========================================================================
  stop:
    desc: Stop all services (preserves containers)
    cmds:
      - "{{.DEPLOY}} stop"

  "stop:inference":
    cmds:
      - "{{.DEPLOY}} stop inference"

  "stop:ray":
    cmds:
      - "{{.DEPLOY}} stop ray"

  # ===========================================================================
  # Restart (remove + recreate — clean slate)
  # ===========================================================================
  restart:
    desc: "Full restart: backup → down all → start all"
    cmds:
      - "{{.DEPLOY}} restart"

  "restart:infra":
    cmds:
      - "{{.DEPLOY}} restart infra"

  "restart:auth":
    cmds:
      - "{{.DEPLOY}} restart auth"

  "restart:mlflow":
    cmds:
      - "{{.DEPLOY}} restart mlflow"

  "restart:ray":
    cmds:
      - "{{.DEPLOY}} restart ray"

  "restart:inference":
    cmds:
      - "{{.DEPLOY}} restart inference"

  "restart:monitoring":
    cmds:
      - "{{.DEPLOY}} restart monitoring"

  "restart:devtools":
    cmds:
      - "{{.DEPLOY}} restart devtools"

  "restart:sba":
    cmds:
      - "{{.DEPLOY}} restart sba"

  "restart:watchdog":
    cmds:
      - "{{.DEPLOY}} restart watchdog"

  "restart:agent":
    cmds:
      - "{{.DEPLOY}} restart agent"

  # ===========================================================================
  # Down
  # ===========================================================================
  down:
    desc: Remove all containers (no volume removal)
    cmds:
      - "{{.DEPLOY}} down"

  # ===========================================================================
  # Deploy (registry-first: pull then start)
  # ===========================================================================
  deploy:
    desc: Pull from GitLab registry then start all services
    cmds:
      - "{{.DEPLOY}} deploy"

  "deploy:inference":
    desc: Pull + start inference services from registry
    cmds:
      - "{{.DEPLOY}} deploy inference"

  "deploy:ray":
    cmds:
      - "{{.DEPLOY}} deploy ray"

  # ===========================================================================
  # Status & Diagnostics
  # ===========================================================================
  status:
    desc: Show service health status and access URLs
    cmds:
      - "{{.DEPLOY}} status"
    silent: true

  diagnose:
    desc: Debug OAuth2/Traefik middleware issues
    cmds:
      - "{{.DEPLOY}} diagnose"

  "fix-oauth":
    desc: Fix FusionAuth OAuth client callback URLs
    cmds:
      - "{{.DEPLOY}} fix-oauth"

  # ===========================================================================
  # Build
  # ===========================================================================
  build:
    desc: Rebuild all custom container images
    cmds:
      - "{{.DEPLOY}} build"

  # ===========================================================================
  # Logs
  # ===========================================================================
  logs:
    desc: "Follow logs for a service: task logs -- <container_name>"
    cmds:
      - docker logs -f {{.CLI_ARGS}}

  # ===========================================================================
  # GPU
  # ===========================================================================
  gpu:
    desc: Show GPU status (nvidia-smi)
    cmds:
      - nvidia-smi --query-gpu=index,name,memory.used,memory.total,utilization.gpu --format=csv,noheader,nounits
    silent: true

  # ===========================================================================
  # Cleanup
  # ===========================================================================
  cleanup:
    desc: "Backup → stop → remove all platform containers and networks"
    cmds:
      - "{{.DEPLOY}} cleanup"

  # ===========================================================================
  # Systemd (Phase 7)
  # ===========================================================================
  "systemd:install":
    desc: Install platform systemd service units (requires sudo)
    cmds:
      - |
        for unit in deploy/systemd/*.service; do
          name=$(basename "$unit")
          echo "Installing $name → /etc/systemd/system/$name"
          sudo ln -sf "$(pwd)/$unit" "/etc/systemd/system/$name"
        done
        sudo systemctl daemon-reload
        echo "✓ Systemd units installed. Enable with: sudo systemctl enable <unit>"

  "systemd:status":
    desc: Show status of all platform systemd units
    cmds:
      - |
        for unit in deploy/systemd/*.service; do
          name=$(basename "$unit")
          systemctl is-active "$name" 2>/dev/null && echo "● $name: active" || echo "○ $name: inactive"
        done

  # ===========================================================================
  # Dev (Phase 8 placeholders — SDK/training editable install)
  # ===========================================================================
  "dev:sdk":
    desc: Clone shml-sdk and install in editable mode
    cmds:
      - |
        if [ ! -d "../shml-sdk" ]; then
          git clone "${GITLAB_URL:-git@gitlab:shml}/shml-sdk.git" ../shml-sdk
        fi
        pip install -e ../shml-sdk
        echo "✓ shml-sdk installed in editable mode from ../shml-sdk"

  "dev:training":
    desc: Use shml/training submodule (libs/training) in editable mode
    cmds:
      - |
        # libs/training is a git submodule — ensure it's initialized
        if [ ! -f "libs/training/setup.py" ]; then
          git submodule update --init libs/training
        fi
        pip install -e libs/training
        echo "✓ shml-training installed in editable mode from libs/training (shml/training submodule)"

  # ===========================================================================
  # IDE Config Generation
  # ===========================================================================
  "ide-configs":
    desc: "Regenerate IDE config files (.github/copilot-instructions.md, .claude/CLAUDE.md, .clinerules) from .agent/rules/ sources"
    cmds:
      - bash scripts/generate-ide-configs.sh --target all
    summary: |
      Assembles IDE-specific configuration files from the canonical rule files in .agent/rules/.
      Edit sources in .agent/rules/ — never edit generated files directly.
      Sources: service-management.md, documentation-policy.md, security.md, platform-context.md, api-conventions.md, code-style.md

  "ide-configs:dry-run":
    desc: "Preview IDE config generation without writing files"
    cmds:
      - bash scripts/generate-ide-configs.sh --target all --dry-run

  # ===========================================================================
  # Testing (blast-radius regression testing via GitNexus)
  # ===========================================================================
  test:
    desc: Run all tests
    cmds:
      - python3 -m pytest tests/ -v --tb=short

  "test:unit":
    desc: Run unit tests only (no running services needed)
    cmds:
      - python3 -m pytest tests/unit/ -v --tb=short -m unit

  "test:integration":
    desc: Run integration tests (requires running services)
    cmds:
      - python3 -m pytest tests/integration/ -v --tb=short -m integration

  "test:blast-radius":
    desc: Run only tests affected by current changes (GitNexus blast radius)
    cmds:
      - python3 scripts/testing/blast_radius.py --run

  "test:blast-radius:report":
    desc: Show blast radius report without running tests
    cmds:
      - python3 scripts/testing/blast_radius.py

  "test:blast-radius:ci":
    desc: Generate JSON blast radius report for CI
    cmds:
      - python3 scripts/testing/blast_radius.py --ci --output blast-radius-report.json

  "test:security":
    desc: Run security validation tests
    cmds:
      - python3 -m pytest tests/unit/test_security_hardening.py -v --tb=short

  "test:contracts":
    desc: Run all compose contract tests
    cmds:
      - python3 -m pytest tests/unit/test_auth_compose_contract.py tests/unit/test_infra_compose_contract.py tests/unit/test_monitoring_config.py tests/unit/test_platform_wiring.py -v

  # ===========================================================================
  # Knowledge Graph (GitNexus + Obsidian intelligence layer)
  # ===========================================================================
  "knowledge:status":
    desc: Show GitNexus index status for all repos
    cmds:
      - gitnexus list

  "knowledge:reindex":
    desc: Reindex all 3 SHML repos in GitNexus
    cmds:
      - gitnexus analyze /home/axelofwar/Projects/shml-platform
      - gitnexus analyze /home/axelofwar/Projects/shml-robotics
      - gitnexus analyze /home/axelofwar/Projects/shml-sba
      - gitnexus list

  "knowledge:reindex:skills":
    desc: Reindex with skill generation (slower, regenerates SKILL.md files)
    cmds:
      - gitnexus analyze --skills /home/axelofwar/Projects/shml-platform
      - gitnexus analyze /home/axelofwar/Projects/shml-robotics
      - gitnexus analyze /home/axelofwar/Projects/shml-sba

  "knowledge:serve":
    desc: Start GitNexus web UI (interactive knowledge graph explorer)
    cmds:
      - gitnexus serve --port 3005

  "knowledge:discover":
    desc: Run research discovery (arXiv + HuggingFace → Obsidian vault)
    cmds:
      - python3 scripts/knowledge/research_discovery.py

  "knowledge:discover:dry-run":
    desc: Preview research discoveries without writing to vault
    cmds:
      - python3 scripts/knowledge/research_discovery.py --dry-run --force

  "knowledge:impact":
    desc: "Blast radius for a symbol: task knowledge:impact -- <symbol_name>"
    cmds:
      - gitnexus impact {{.CLI_ARGS}}

  "knowledge:context":
    desc: "360-degree view of a symbol: task knowledge:context -- <symbol_name>"
    cmds:
      - gitnexus context {{.CLI_ARGS}}

  "knowledge:connmap":
    desc: Regenerate the platform connection map in Obsidian vault
    cmds:
      - python3 scripts/generate_connection_map.py

  # ── Hermes Agent ──────────────────────────────────────────

  "hermes:gateway":
    desc: Start Hermes gateway (HTTP API on :8642, RBAC via Traefik)
    cmds:
      - scripts/hermes-gateway.sh start

  "hermes:gateway:stop":
    desc: Stop Hermes gateway
    cmds:
      - scripts/hermes-gateway.sh stop

  "hermes:gateway:status":
    desc: Check Hermes gateway status
    cmds:
      - scripts/hermes-gateway.sh status

  "hermes:gateway:logs":
    desc: Follow Hermes gateway logs
    cmds:
      - scripts/hermes-gateway.sh logs

  "hermes:workspace":
    desc: Start Hermes workspace web GUI on :3002
    cmds:
      - scripts/hermes-workspace.sh start

  "hermes:workspace:stop":
    desc: Stop Hermes workspace
    cmds:
      - scripts/hermes-workspace.sh stop

  "hermes:all":
    desc: Start both Hermes gateway + workspace
    cmds:
      - scripts/hermes-gateway.sh start
      - scripts/hermes-workspace.sh start

  "hermes:all:stop":
    desc: Stop both Hermes gateway + workspace
    cmds:
      - scripts/hermes-workspace.sh stop
      - scripts/hermes-gateway.sh stop
