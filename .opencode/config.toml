# OpenCode Configuration for SHML Platform
# Auto-generated: 2025-12-18

# Default model for coding tasks
defaultModel = "local-coding/qwopus-coding"

# Agent-service exposes OpenAI-compatible /v1/chat/completions at port 8099.
# qwopus-coding (llama-server) is Docker-internal only — no direct host port.
[providers.local-coding]
type = "openai"
baseURL = "http://localhost:8099/v1"

[[providers.local-coding.models]]
id = "qwopus-coding"
name = "Qwopus-27B (Local via agent-service)"
maxTokens = 16384
contextWindow = 65536

# Qwen3-VL-8B (Local Vision Model)
[providers.local-vision]
type = "openai"
baseURL = "http://localhost:8000/api/llm/v1"

[[providers.local-vision.models]]
id = "qwen3-vl"
name = "Qwen3-VL-8B (Vision)"
supportsAttachments = true

# MCP Tools Integration
[mcp.shml-platform]
type = "http"
url = "http://localhost:8000/mcp"
timeout = 120000
