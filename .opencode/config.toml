# OpenCode Configuration for SHML Platform
# Auto-generated: 2025-12-18

# Default model for coding tasks
defaultModel = "local-coding/qwopus-coding"

# Agent-service exposes OpenAI-compatible /v1/chat/completions at port 8099.
# qwopus-coding (llama-server) is Docker-internal only — no direct host port.
[providers.local-coding]
type = "openai"
baseURL = "http://localhost:8099/v1"

[[providers.local-coding.models]]
id = "qwopus-coding"
name = "Qwopus-27B (Local via agent-service)"
maxTokens = 16384
contextWindow = 131072

# Qwen3-VL-8B (Local Vision Model)
[providers.local-vision]
type = "openai"
baseURL = "http://localhost:8000/api/llm/v1"

[[providers.local-vision.models]]
id = "qwen3-vl"
name = "Qwen3-VL-8B (Vision)"
supportsAttachments = true

# MCP Tools Integration
[mcp.shml-platform]
type = "http"
url = "http://localhost:8000/mcp"
timeout = 120000

# GitNexus Code Intelligence — knowledge graph over all SHML repos
# 14,868 symbols, 40,672 relationships, 300 execution flows
# Tools: query, context, impact, detect_changes, rename, cypher, list_repos
[mcp.gitnexus]
type = "stdio"
command = "gitnexus"
args = ["mcp"]
timeout = 30000

# GitLab CE — issues, MRs, pipelines, code search
# Self-hosted at /gitlab/. Projects: platform(2), robotics(3), training(4), sba(5)
[mcp.gitlab]
type = "stdio"
command = "/home/axelofwar/Projects/shml-platform/scripts/mcp/run-gitlab-mcp.sh"
timeout = 30000

# Prometheus Metrics — PromQL queries, alerts, targets
# 11 tools: query, range_query, label_names, label_values, series, alerts, rules, targets
[mcp.prometheus]
type = "stdio"
command = "/home/axelofwar/Projects/shml-platform/scripts/mcp/run-prometheus-mcp.sh"
timeout = 15000
