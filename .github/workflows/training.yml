# Training Library CI
# Tests and validates the shml_training Python package (libs/training/).
# Runs on changes to libs/training/** or manually.

name: Training Library CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'libs/training/**'
      - '.gitmodules'
  pull_request:
    branches: [main]
    paths:
      - 'libs/training/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install ruff black --quiet

      - name: ruff check
        run: ruff check libs/training/shml_training || true

      - name: black --check
        run: black --check libs/training/shml_training || true

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          pip install mypy --quiet
          pip install -e libs/training --quiet

      - name: mypy
        run: mypy libs/training/shml_training --ignore-missing-imports --no-error-summary || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e libs/training pytest pytest-asyncio --quiet

      - name: Run tests
        run: |
          if [ -d "libs/training/tests" ]; then
            pytest libs/training/tests/ -v --tb=short
          else
            echo "No tests yet — smoke test imports"
            python3 -c "
          import shml_training
          from shml_training.core import trainer, config, hardware, memory
          from shml_training.integrations import mlflow_callback, ray
          from shml_training.sdk import client
          print('All imports OK on Python ${{ matrix.python-version }}')
          "
          fi

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: pip-audit
        run: |
          pip install pip-audit --quiet
          if [ -f "libs/training/requirements.txt" ]; then
            pip-audit -r libs/training/requirements.txt --ignore-vuln PYSEC-2022-43012 || true
          fi
          pip install -e libs/training --quiet
          pip-audit --ignore-vuln PYSEC-2022-43012 || true
          echo "✓ Audit complete"

  build-wheel:
    name: Build Wheel
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build
        run: |
          pip install build --quiet
          cd libs/training && python -m build --wheel --outdir dist/
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: training-wheel
          path: libs/training/dist/*.whl
          retention-days: 7
