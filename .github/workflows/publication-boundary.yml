name: Publication Boundary Check

on:
  workflow_dispatch:
  push:
    branches: [public-mirror]
  pull_request:
    branches: [public-mirror]

permissions:
  contents: read

jobs:
  boundary-check:
    name: Validate Public Mirror Boundary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate allowlist and denylist
        run: |
          python - <<'PY'
          import fnmatch
          import subprocess
          import sys
          from pathlib import Path

          root = Path('.')
          allowlist_file = root / '.github' / 'public-mirror-allowlist.txt'
          denylist_file = root / '.github' / 'public-mirror-denylist.txt'

          def load_patterns(path: Path):
              patterns = []
              for line in path.read_text().splitlines():
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  patterns.append(line)
              return patterns

          allow_patterns = load_patterns(allowlist_file)
          deny_patterns = load_patterns(denylist_file)

          result = subprocess.run(
              ['git', 'ls-files'],
              capture_output=True,
              text=True,
              check=True,
          )
          files = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          deny_hits = []
          allow_misses = []

          for file_path in files:
              if any(fnmatch.fnmatch(file_path, pattern) for pattern in deny_patterns):
                  deny_hits.append(file_path)
                  continue
              if not any(fnmatch.fnmatch(file_path, pattern) for pattern in allow_patterns):
                  allow_misses.append(file_path)

          if deny_hits:
              print('Denylist violations found:')
              for file_path in deny_hits:
                  print(f'  - {file_path}')

          if allow_misses:
              print('Allowlist misses found:')
              for file_path in allow_misses:
                  print(f'  - {file_path}')

          if deny_hits or allow_misses:
              print('\nPublication boundary check failed.')
              sys.exit(1)

          print('Publication boundary check passed.')
          PY
